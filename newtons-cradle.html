// ---------- layout constants ----------
const BALL_R = 0.5
const N_BALLS = 6
const SPACING = 2 * BALL_R          // touching at rest
const PIVOT_Y = 3.25                // top attachment (right under the beam underside)
const REST_Y = 0                    // ball center at rest
const WIRE_LEN = PIVOT_Y - REST_Y   // pivot -> ball center
const HALF = (N_BALLS - 1) / 2      // 2.5
const restX = i => (i - HALF) * SPACING

const MAX_ANGLE = 0.5               // rad
const OMEGA = (2 * Math.PI) / 2.5   // one full cycle ~2.5s

// balls hang in a plane forward of the frame so the side columns sit
// behind them (as in the reference image)
const BALL_Z = 0.8

// ---------- procedural studio environment (for chrome reflections) ----------
function EnvironmentSetup() {
  const { scene, gl } = useThree()
  useEffect(() => {
    const c = document.createElement('canvas')
    c.width = 1024; c.height = 512
    const ctx = c.getContext('2d')
    // vertical gradient: dark floor -> mid -> lighter ceiling
    const g = ctx.createLinearGradient(0, 0, 0, 512)
    g.addColorStop(0.0, '#3a4048')
    g.addColorStop(0.45, '#2a2f36')
    g.addColorStop(0.55, '#20242a')
    g.addColorStop(1.0, '#0e1013')
    ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 512)
    // soft bright "softbox" bands for glossy highlights
    const soft = (x, y, w, h, a) => {
      const rg = ctx.createRadialGradient(x, y, 0, x, y, Math.max(w, h))
      rg.addColorStop(0, `rgba(240,248,255,${a})`)
      rg.addColorStop(1, 'rgba(240,248,255,0)')
      ctx.fillStyle = rg
      ctx.fillRect(x - w, y - h, w * 2, h * 2)
    }
    soft(300, 150, 260, 120, 0.9)
    soft(760, 180, 220, 110, 0.7)
    // cool neon reflection streak
    const ng = ctx.createLinearGradient(0, 300, 1024, 340)
    ng.addColorStop(0, 'rgba(63,208,255,0)')
    ng.addColorStop(0.5, 'rgba(63,208,255,0.35)')
    ng.addColorStop(1, 'rgba(63,208,255,0)')
    ctx.fillStyle = ng; ctx.fillRect(0, 300, 1024, 26)

    const tex = new THREE.CanvasTexture(c)
    tex.mapping = THREE.EquirectangularReflectionMapping
    tex.colorSpace = THREE.SRGBColorSpace
    const pmrem = new THREE.PMREMGenerator(gl)
    const rt = pmrem.fromEquirectangular(tex)
    scene.environment = rt.texture
    return () => { rt.dispose(); pmrem.dispose(); tex.dispose() }
  }, [scene, gl])
  return null
}

// ---------- reusable neon strip (emissive, blooms) ----------
function Neon({ args, position, rotation, color = NEON, intensity = 3.4 }) {
  return (
    <mesh position={position} rotation={rotation}>
      <boxGeometry args={args} />
      <meshStandardMaterial
        color={color}
        emissive={color}
        emissiveIntensity={intensity}
        toneMapped={false}
        roughness={0.4}
        metalness={0}
      />
    </mesh>
  )
}

// ---------- curved inverted-U arch (single extruded frame) ----------
// The top curves down into the legs; the opening is wide so the swinging
// end balls clear the columns. Outer half-width XO, inner (opening) XI.
// Balls swing in a plane (z=0.5) in FRONT of the columns (front face z=0),
// so the opening no longer needs to clear the full swing - the end ball just
// passes in front of the column. This lets the structure be narrower.
const XO = 3.75          // outer half-width of frame (slender columns)
const XI = 3.5           // inner opening half-width
const Y_FOOT = -1.6      // bottom of legs (rest on base)
const Y_TOP_O = 4.35     // outer top of arch
const Y_TOP_I = 3.25     // inner top (wires hang just below this)
const R_O = 0.6          // outer corner radius (the visible top curve)
const R_I = 0.35         // inner corner radius
const FRAME_DEPTH = 0.8
// The frame is placed so its FRONT face sits at z = 0. That front plane is
// where the balls hang and where the wires attach to the beam; the columns
// extend backward (negative z), so they sit behind the balls.
const FRONT_Z = 0

function makeArchShape() {
  const s = new THREE.Shape()
  // outer boundary: up left leg, around rounded top, down right leg
  s.moveTo(-XO, Y_FOOT)
  s.lineTo(-XO, Y_TOP_O - R_O)
  s.quadraticCurveTo(-XO, Y_TOP_O, -XO + R_O, Y_TOP_O)
  s.lineTo(XO - R_O, Y_TOP_O)
  s.quadraticCurveTo(XO, Y_TOP_O, XO, Y_TOP_O - R_O)
  s.lineTo(XO, Y_FOOT)
  // inner boundary (creates the open arch band)
  s.lineTo(XI, Y_FOOT)
  s.lineTo(XI, Y_TOP_I - R_I)
  s.quadraticCurveTo(XI, Y_TOP_I, XI - R_I, Y_TOP_I)
  s.lineTo(-XI + R_I, Y_TOP_I)
  s.quadraticCurveTo(-XI, Y_TOP_I, -XI, Y_TOP_I - R_I)
  s.lineTo(-XI, Y_FOOT)
  s.closePath()
  return s
}

function Frame() {
  const geo = useMemo(() => {
    const g = new THREE.ExtrudeGeometry(makeArchShape(), {
      depth: FRAME_DEPTH,
      bevelEnabled: true,
      bevelThickness: 0.14,
      bevelSize: 0.14,
      bevelSegments: 4,
      curveSegments: 32,
    })
    g.translate(0, 0, -FRAME_DEPTH)   // front face -> z = 0, body extends back
    g.computeVertexNormals()
    return g
  }, [])

  // neon tube tracing the inner contour on the front face
  const neonGeo = useMemo(() => {
    const zf = FRONT_Z + 0.12
    const pts = [
      new THREE.Vector3(-XI, Y_FOOT + 0.1, zf),
      new THREE.Vector3(-XI, Y_TOP_I - R_I, zf),
      new THREE.Vector3(-XI + R_I, Y_TOP_I, zf),
      new THREE.Vector3(0, Y_TOP_I, zf),
      new THREE.Vector3(XI - R_I, Y_TOP_I, zf),
      new THREE.Vector3(XI, Y_TOP_I - R_I, zf),
      new THREE.Vector3(XI, Y_FOOT + 0.1, zf),
    ]
    const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.35)
    return new THREE.TubeGeometry(curve, 160, 0.04, 12, false)
  }, [])

  // neon tube tracing the outer top edge (front)
  const neonOuterGeo = useMemo(() => {
    const zf = FRONT_Z + 0.12
    const pts = [
      new THREE.Vector3(-XO + 0.05, Y_TOP_O - R_O - 0.8, zf),
      new THREE.Vector3(-XO + 0.05, Y_TOP_O - R_O, zf),
      new THREE.Vector3(-XO + R_O, Y_TOP_O - 0.05, zf),
      new THREE.Vector3(0, Y_TOP_O - 0.05, zf),
      new THREE.Vector3(XO - R_O, Y_TOP_O - 0.05, zf),
      new THREE.Vector3(XO - 0.05, Y_TOP_O - R_O, zf),
      new THREE.Vector3(XO - 0.05, Y_TOP_O - R_O - 0.8, zf),
    ]
    const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.4)
    return new THREE.TubeGeometry(curve, 160, 0.03, 12, false)
  }, [])

  return (
    <group>
      <mesh geometry={geo} castShadow receiveShadow>
        <meshStandardMaterial color={FRAME_DARK} metalness={0.62} roughness={0.42} />
      </mesh>
      {/* brushed silver highlight strip along the top crown */}
      <mesh position={[0, Y_TOP_O + 0.02, -FRAME_DEPTH / 2]}>
        <boxGeometry args={[(XO - R_O) * 2, 0.05, FRAME_DEPTH * 0.7]} />
        <meshStandardMaterial color={SILVER} metalness={0.92} roughness={0.26} />
      </mesh>
      {/* neon contours */}
      <mesh geometry={neonGeo}>
        <meshStandardMaterial color={NEON} emissive={NEON} emissiveIntensity={3.6}
          toneMapped={false} roughness={0.4} metalness={0} />
      </mesh>
      <mesh geometry={neonOuterGeo}>
        <meshStandardMaterial color={NEON} emissive={NEON} emissiveIntensity={3.0}
          toneMapped={false} roughness={0.4} metalness={0} />
      </mesh>
    </group>
  )
}

// ---------- top beam: overhangs forward to the ball plane so wires hang
// vertically from it while the columns (in the Frame) stay behind ----------
function Beam() {
  const w = XO * 2
  return (
    <group position={[0, 3.8, 0.4]}>
      <RoundedBox args={[w, 1.05, 2.0]} radius={0.26} smoothness={5} castShadow receiveShadow>
        <meshStandardMaterial color={FRAME_DARK} metalness={0.65} roughness={0.4} />
      </RoundedBox>
      {/* brushed silver top face */}
      <mesh position={[0, 0.53, 0]}>
        <boxGeometry args={[w - 0.7, 0.05, 1.8]} />
        <meshStandardMaterial color={SILVER} metalness={0.92} roughness={0.26} />
      </mesh>
      {/* neon accents along the front face */}
      <Neon args={[w - 0.5, 0.05, 0.05]} position={[0, 0.32, 1.02]} />
      <Neon args={[w - 0.5, 0.05, 0.05]} position={[0, -0.4, 1.02]} />
    </group>
  )
}

// ---------- flared feet where the legs meet the base ----------
function Feet() {
  const legX = (XO + XI) / 2
  return (
    <group>
      {[-legX, legX].map((x, i) => (
        <group key={i} position={[x, Y_FOOT, -FRAME_DEPTH / 2]}>
          <mesh position={[0, 0.02, 0]} castShadow>
            <cylinderGeometry args={[0.42, 0.72, 0.4, 44]} />
            <meshStandardMaterial color={STEEL} metalness={0.85} roughness={0.32} />
          </mesh>
          <mesh position={[0, -0.22, 0]} castShadow>
            <cylinderGeometry args={[0.72, 0.8, 0.16, 44]} />
            <meshStandardMaterial color={FRAME_DARK} metalness={0.5} roughness={0.5} />
          </mesh>
        </group>
      ))}
    </group>
  )
}

// ---------- AEVA wordmark engraved (illuminated) on the pedestal top ----------
function Logo() {
  const tex = useMemo(() => {
    const t = new THREE.TextureLoader().load(AEVA_LOGO_URI)
    t.colorSpace = THREE.SRGBColorSpace
    t.anisotropy = 8
    return t
  }, [])
  const W = 3.6, H = W * (568 / 2252)   // preserve logo aspect
  return (
    <mesh position={[0, -1.585, 0.35]} rotation={[-Math.PI / 2, 0, 0]}>
      <planeGeometry args={[W, H]} />
      <meshStandardMaterial
        map={tex}
        emissive={NEON}
        emissiveMap={tex}
        emissiveIntensity={1.7}
        transparent
        toneMapped={false}
        depthWrite={false}
        roughness={0.5}
        metalness={0}
      />
    </mesh>
  )
}

// ---------- base slab ----------
function Base() {
  return (
    <group position={[0, -1.95, -0.35]}>
      <RoundedBox args={[8.4, 0.7, 2.6]} radius={0.16} smoothness={5} castShadow receiveShadow>
        <meshStandardMaterial color={FRAME_DARK} metalness={0.6} roughness={0.45} />
      </RoundedBox>
      {/* recessed darker inset panel on the front */}
      <mesh position={[0, 0.02, 1.16]}>
        <boxGeometry args={[7.2, 0.4, 0.08]} />
        <meshStandardMaterial color="#0e1116" metalness={0.5} roughness={0.6} />
      </mesh>
      {/* neon outline on the front face */}
      <Neon args={[7.8, 0.04, 0.04]} position={[0, 0.28, 1.22]} />
      <Neon args={[7.8, 0.04, 0.04]} position={[0, -0.3, 1.22]} />
      {/* small triangle / chevron logo, emissive */}
      <group position={[0, 0.02, 1.24]}>
        <Neon args={[0.34, 0.045, 0.03]} position={[0, 0.12, 0]} intensity={4} />
        <Neon args={[0.24, 0.045, 0.03]} position={[0, 0.02, 0]} intensity={4} />
        <Neon args={[0.14, 0.045, 0.03]} position={[0, -0.08, 0]} intensity={4} />
      </group>
    </group>
  )
}

// ---------- a single pendulum: pivot group holds wire + chrome ball ----------
const _v = new THREE.Vector3()

function Pendulum({ index, angleRef, isLeftEnd, isRightEnd }) {
  const pivot = useRef()
  const ballGroup = useRef()

  useFrame(() => {
    const A = angleRef.current
    let rot = 0
    if (isLeftEnd) {
      const a = Math.max(A, 0)   // >=0
      rot = -a                   // positive a -> swing to -x (left)
    } else if (isRightEnd) {
      const a = Math.min(A, 0)   // <=0
      rot = -a                   // negative a -> swing to +x (right)
    } else {
      rot = 0                    // middle balls never move
    }
    if (pivot.current) pivot.current.rotation.z = rot
  })

  return (
    <group ref={pivot} position={[restX(index), PIVOT_Y, BALL_Z]}>
      {/* attachment cap */}
      <mesh position={[0, 0.02, 0]}>
        <cylinderGeometry args={[0.07, 0.09, 0.14, 16]} />
        <meshStandardMaterial color={STEEL} metalness={0.95} roughness={0.25} />
      </mesh>
      {/* thin wire down to ball center */}
      <mesh position={[0, -WIRE_LEN / 2, 0]}>
        <cylinderGeometry args={[0.012, 0.012, WIRE_LEN, 8]} />
        <meshStandardMaterial color={SILVER} metalness={1} roughness={0.3} />
      </mesh>
      {/* ball group at the wire's end */}
      <group ref={ballGroup} position={[0, -WIRE_LEN, 0]}>
        <Trail
          width={2.4}
          length={5}
          color={new THREE.Color(NEON)}
          attenuation={(t) => t * t}
          decay={1.6}
        >
          <mesh castShadow>
            <sphereGeometry args={[BALL_R, 48, 48]} />
            <meshStandardMaterial
              color="#e8edf2"
              metalness={1}
              roughness={0.08}
              envMapIntensity={1.4}
            />
          </mesh>
        </Trail>
        {/* small stud where the wire meets the ball */}
        <mesh position={[0, BALL_R - 0.02, 0]}>
          <cylinderGeometry args={[0.05, 0.07, 0.1, 16]} />
          <meshStandardMaterial color={STEEL} metalness={0.95} roughness={0.25} />
        </mesh>
        {/* glowing blue core facing camera (+z) */}
        <mesh position={[0, 0, BALL_R * 0.72]}>
          <sphereGeometry args={[0.14, 24, 24]} />
          <meshStandardMaterial
            color={NEON}
            emissive={NEON}
            emissiveIntensity={5}
            toneMapped={false}
          />
        </mesh>
        <pointLight position={[0, 0, BALL_R]} color={NEON} intensity={0.5} distance={2.2} />
      </group>
    </group>
  )
}

// ---------- drives the master angle from the clock ----------
function CradleController({ angleRef }) {
  useFrame(({ clock }) => {
    angleRef.current = MAX_ANGLE * Math.cos(OMEGA * clock.elapsedTime)
  })
  return null
}

function Cradle() {
  const angleRef = useRef(MAX_ANGLE) // start swung out to the left
  const balls = useMemo(() => Array.from({ length: N_BALLS }, (_, i) => i), [])
  return (
    <group position={[0, 0.2, 0]}>
      <CradleController angleRef={angleRef} />
      <Base />
      <Logo />
      {/* columns sit at the back of the base; the whole suspended assembly
          (frame + beam + balls) is shifted back together so wires stay
          vertical and the base extends forward as a platform */}
      <group position={[0, 0, -0.85]}>
        <Frame />
        <Beam />
        {balls.map((i) => (
          <Pendulum
            key={i}
            index={i}
            angleRef={angleRef}
            isLeftEnd={i === 0}
            isRightEnd={i === N_BALLS - 1}
          />
        ))}
      </group>
    </group>
  )
}

function Scene() {
  return (
    <>
      <color attach="background" args={['#24282e']} />
      <fog attach="fog" args={['#24282e', 20, 40]} />

      <EnvironmentSetup />

      <ambientLight intensity={0.35} />
      <directionalLight
        position={[6, 9, 6]}
        intensity={1.5}
        castShadow
        shadow-mapSize={[2048, 2048]}
        shadow-camera-left={-12}
        shadow-camera-right={12}
        shadow-camera-top={12}
        shadow-camera-bottom={-12}
        shadow-bias={-0.0002}
      />
      <directionalLight position={[-7, 4, -3]} intensity={0.5} color={NEON} />
      <spotLight position={[0, 8, 5]} angle={0.6} penumbra={0.8} intensity={0.8} />

      <Cradle />

      <ContactShadows
        position={[0, -2.35, 0]}
        opacity={0.5}
        scale={22}
        blur={2.6}
        far={6}
        resolution={1024}
        color="#000000"
      />

      <OrbitControls
        enablePan={false}
        minDistance={9}
        maxDistance={30}
        minPolarAngle={0.6}
        maxPolarAngle={Math.PI / 2 + 0.05}
        target={[0, 0.3, 0]}
      />

      <EffectComposer>
        <Bloom
          intensity={0.9}
          luminanceThreshold={0.6}
          luminanceSmoothing={0.25}
          mipmapBlur
        />
      </EffectComposer>
    </>
  )
}

function App() {
  return (
    <Canvas
      shadows
      dpr={[1, 2]}
      gl={{ antialias: true, powerPreference: 'high-performance' }}
      camera={{ position: [5.4, 2.5, 10.1], fov: 32, near: 0.1, far: 100 }}
    >
      <Scene />
    </Canvas>
  )
}

createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
