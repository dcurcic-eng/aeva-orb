<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================== renderer / scene ============================== */
const container = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xa1a1a0);
scene.fog = new THREE.Fog(0xa1a1a0, 34, 90);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 200);
camera.position.set(9.5, 5.6, 11.5);

camera.lookAt(0.3, 2.9, 0);

// mouse orbit / zoom / pan
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.3, 2.9, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 45;
controls.maxPolarAngle = Math.PI * 0.52; // stop just above the floor
controls.update();

/* ============================== lights ============================== */
scene.add(new THREE.HemisphereLight(0xdfe4ea, 0x8b8c8e, 0.55));

const key = new THREE.DirectionalLight(0xffffff, 2.4);
key.position.set(9, 15, 8);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -10; key.shadow.camera.right = 10;
key.shadow.camera.top = 10;   key.shadow.camera.bottom = -10;
key.shadow.camera.far = 45;
key.shadow.bias = -0.0004;
key.shadow.radius = 6;
scene.add(key);

const fill = new THREE.DirectionalLight(0xdfe8ff, 0.55);
fill.position.set(-10, 7, -8);
scene.add(fill);

function dataTex(uri, rx, ry) {
  const t = new THREE.TextureLoader().load(uri);
  t.wrapS = t.wrapT = THREE.MirroredRepeatWrapping; // seamless tiling
  t.repeat.set(rx, ry);
  t.anisotropy = 8;
  return t;
}

/* ============================== helpers ============================== */
function roundedRectShape(w, d, r) {
  const s = new THREE.Shape(), hw = w / 2, hd = d / 2;
  s.moveTo(-hw + r, -hd);
  s.lineTo(hw - r, -hd);
  s.absarc(hw - r, -hd + r, r, -Math.PI / 2, 0);
  s.lineTo(hw, hd - r);
  s.absarc(hw - r, hd - r, r, 0, Math.PI / 2);
  s.lineTo(-hw + r, hd);
  s.absarc(-hw + r, hd - r, r, Math.PI / 2, Math.PI);
  s.lineTo(-hw, -hd + r);
  s.absarc(-hw + r, -hd + r, r, Math.PI, Math.PI * 1.5);
  return s;
}

// extruded rounded slab lying flat (y up), origin at bottom center
function slab(w, d, r, h, mat, bevel = 0.045) {
  const geo = new THREE.ExtrudeGeometry(roundedRectShape(w, d, r), {
    depth: h - bevel * 2, bevelEnabled: true, bevelThickness: bevel,
    bevelSize: bevel, bevelSegments: 3, curveSegments: 24
  });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, bevel, 0);
  return new THREE.Mesh(geo, mat);
}

function cyl(r1, r2, h, mat, seg = 32) {
  return new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, seg), mat);
}
function cylZ(r1, r2, h, mat, seg = 32) {
  const m = cyl(r1, r2, h, mat, seg);
  m.rotation.x = Math.PI / 2;
  return m;
}
function box(w, h, d, mat, r = 0) {
  const g = r > 0 ? new RoundedBoxGeometry(w, h, d, 3, r) : new THREE.BoxGeometry(w, h, d);
  return new THREE.Mesh(g, mat);
}
// thin emissive light strip on a surface
function strip(parent, w, h, x, y, z, rotY = 0) {
  const m = box(w, h, 0.028, matGlow);
  m.position.set(x, y, z);
  m.rotation.y = rotY;
  parent.add(m);
  return m;
}
function bolt(parent, x, y, z, r = 0.045) {
  const b = cylZ(r, r, 0.05, matSteel, 12);
  b.position.set(x, y, z);
  parent.add(b);
  return b;
}

const _up = new THREE.Vector3(0, 1, 0), _d = new THREE.Vector3();
function placeBetween(mesh, a, b) { // mesh: unit-height Y cylinder
  _d.subVectors(b, a);
  const len = _d.length();
  mesh.position.copy(a).addScaledVector(_d, 0.5);
  mesh.quaternion.setFromUnitVectors(_up, _d.normalize());
  mesh.scale.y = len;
}

function pylonShape(hwBot, hwTop, yBot, yTop) {
  const s = new THREE.Shape();
  s.moveTo(-hwBot, yBot);
  s.lineTo(hwBot, yBot);
  s.lineTo(hwTop, yTop);
  s.quadraticCurveTo(0, yTop + 0.35, -hwTop, yTop);
  s.closePath();
  return s;
}

  beamGroup.add(pinCapF);
  const pinCapB = pinCapF.clone(); pinCapB.position.z = -0.55;
  beamGroup.add(pinCapB);
}
// left pin extension forward, so the connecting rod plane clears the flywheel bearing
const pinExt = cylZ(0.11, 0.11, 0.75, matSteel, 20);
pinExt.position.set(-BEAM_L, 0.02, 0.72);
beamGroup.add(pinExt);

// light strips on beam faces
for (const s of [1, -1]) {
  strip(beamGroup, 0.95, 0.05, -2.95, 0.12, s * 0.3);
  strip(beamGroup, 0.75, 0.05, 2.95, 0.06, s * 0.3);
  strip(beamGroup, 0.5, 0.045, -1.05, -0.28, s * 0.3);
  strip(beamGroup, 0.5, 0.045, 1.05, -0.28, s * 0.3);
}

/* ============================== flywheel + pedestal (left) ============================== */
const WX = -3.1, WY = 2.7, WHEEL_R = 1.42;
const CRANK_R = 0.6;
const RODZ = 1.0; // rod plane: pushed forward so the rod passes over the static bearing cap

// pedestal
const pedGeo = new THREE.ExtrudeGeometry(pylonShape(0.95, 0.62, DECK_Y, 2.3), {
  depth: 1.0, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 2
});
pedGeo.translate(0, 0, -0.2);
const pedestal = new THREE.Mesh(pedGeo, matBodyDark);
pedestal.position.x = WX;
machine.add(pedestal);
const pedFoot = box(2.2, 0.18, 1.5, matBodyDark, 0.04);
pedFoot.position.set(WX, DECK_Y + 0.08, 0.3);
machine.add(pedFoot);
strip(machine, 0.85, 0.05, WX, 1.55, 0.87);
bolt(machine, WX - 0.75, 1.15, 0.87); bolt(machine, WX + 0.75, 1.15, 0.87);

// wheel (rotates)
const wheelGroup = new THREE.Group();
wheelGroup.position.set(WX, WY, -0.18);
machine.add(wheelGroup);

const rim = new THREE.Mesh(new THREE.TorusGeometry(WHEEL_R, 0.17, 20, 72), matBody);
wheelGroup.add(rim);
const rimInner = new THREE.Mesh(new THREE.TorusGeometry(WHEEL_R - 0.14, 0.06, 12, 72), matBodyDark);
wheelGroup.add(rimInner);
for (const s of [1, -1]) {
  const glowRing = new THREE.Mesh(new THREE.TorusGeometry(WHEEL_R - 0.16, 0.035, 10, 72), matGlow);
  glowRing.position.z = s * 0.1;
  wheelGroup.add(glowRing);
}
for (let i = 0; i < 6; i++) {
  const spoke = box(0.2, 1.22, 0.22, matBody, 0.03);
  spoke.position.y = 0.66;
  const holder = new THREE.Group();
  holder.rotation.z = (i / 6) * Math.PI * 2;
  holder.add(spoke);
  wheelGroup.add(holder);
}
const wheelHub = cylZ(0.42, 0.42, 0.5, matBodyDark, 36);
wheelGroup.add(wheelHub);

// crank in front of the bearing housing: disc + arm + pin at local +X * CRANK_R
const crankDisc = cylZ(0.32, 0.32, 0.16, matSteelDark, 32);
crankDisc.position.z = 1.0;
wheelGroup.add(crankDisc);
const crankArm = box(0.72, 0.26, 0.13, matSteelDark, 0.03);
crankArm.position.set(CRANK_R / 2, 0, 1.06);
wheelGroup.add(crankArm);
const crankPinMesh = cylZ(0.1, 0.1, 0.5, matSteel, 20);
crankPinMesh.position.set(CRANK_R, 0, 1.12);
wheelGroup.add(crankPinMesh);

// static bearing housing in front of wheel
const bearingSt = new THREE.Group();
bearingSt.position.set(WX, WY, 0.42);
machine.add(bearingSt);
const bPlate = cylZ(0.62, 0.62, 0.1, matSteelDark, 48); bearingSt.add(bPlate);
const bRing  = cylZ(0.54, 0.54, 0.14, matSteelDark, 48); bRing.position.z = 0.05; bearingSt.add(bRing);
const bBody  = cylZ(0.42, 0.42, 0.16, matSteel, 48); bBody.position.z = 0.13; bearingSt.add(bBody);
const bGroove = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.018, 10, 48), matSteelDark); bGroove.position.z = 0.2; bearingSt.add(bGroove);
const bInner = cylZ(0.24, 0.24, 0.08, matSteelDark, 40); bInner.position.z = 0.21; bearingSt.add(bInner);
const bSquare = box(0.24, 0.24, 0.06, matSteel, 0.05); bSquare.position.z = 0.26; bearingSt.add(bSquare);
const bDot = cylZ(0.05, 0.05, 0.04, matSteelDark, 20); bDot.position.z = 0.3; bearingSt.add(bDot);
for (let i = 0; i < 4; i++) {
  const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
  bolt(bearingSt, Math.cos(a) * 0.5, Math.sin(a) * 0.5, 0.08, 0.045);
}
// axle wheel->bearing
const axle = cylZ(0.15, 0.15, 1.1, matSteel, 20);
axle.position.set(WX, WY, 0.15);
machine.add(axle);

/* ============================== connecting rod (left, 2-piece) ============================== */
const rodLower = cyl(0.085, 0.085, 1, matSteel, 16);
const rodUpper = cyl(0.075, 0.075, 1, matSteel, 16);
const knuckle = new THREE.Group();
const knDisc = cylZ(0.17, 0.17, 0.22, matSteelDark, 24); knuckle.add(knDisc);
const knPin = cylZ(0.07, 0.07, 0.34, matSteel, 16); knuckle.add(knPin);
machine.add(rodLower, rodUpper, knuckle);

// rod big-end collar (rides on crank pin)
const bigEnd = cylZ(0.16, 0.16, 0.2, matSteelDark, 24);
machine.add(bigEnd);
// rod small-end collar (rides on beam pin)
const smallEnd = cylZ(0.15, 0.15, 0.2, matSteelDark, 24);
machine.add(smallEnd);

/* ============================== cylinder assembly (right) ============================== */
const CYLX = 3.55;
const cylGrp = new THREE.Group();
cylGrp.position.set(CYLX, 0, 0);
machine.add(cylGrp);

function addAt(m, y) { m.position.y = y; cylGrp.add(m); return m; }

// round stepped base plinth
addAt(cyl(1.05, 1.12, 0.16, matBodyDark, 48), DECK_Y + 0.08);
addAt(cyl(0.95, 1.0, 0.14, matSteelDark, 48), DECK_Y + 0.24);
addAt(cyl(0.82, 0.86, 0.24, matBodyDark, 48), DECK_Y + 0.43);
// front vent grille on the plinth base
for (let i = -1; i <= 1; i++) {
  const vent = box(0.2, 0.16, 0.12, matBodyDark, 0.01);
  vent.position.set(CYLX + i * 0.26, DECK_Y + 0.2, 0.84);
  machine.add(vent);
}
addAt(cyl(0.86, 0.86, 0.13, matSteel, 48), DECK_Y + 0.62);      // lower flange

// solid dark cylindrical body
const WINDOW_Y = DECK_Y + 1.4;
addAt(cyl(0.66, 0.66, 1.42, matBodyDark, 56), WINDOW_Y);

// ---- capsule sight-glass window on the front (+Z) ----
function capExtrude(w, h, depth, mat, bevel) {
  const shape = roundedRectShape(w, h, Math.min(w, h) / 2 - 0.001);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: depth, bevelEnabled: bevel > 0, bevelThickness: bevel, bevelSize: bevel,
    bevelSegments: 3, curveSegments: 28
  });
  return new THREE.Mesh(geo, mat);
}
// beveled dark frame (capsule ring) embedded in the body, standing proud
const frameShape = roundedRectShape(0.92, 1.56, 0.46 - 0.001);
frameShape.holes.push(roundedRectShape(0.66, 1.26, 0.33 - 0.001));
const frame = new THREE.Mesh(new THREE.ExtrudeGeometry(frameShape, {
  depth: 0.36, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2, curveSegments: 28
}), matBodyDark);
frame.position.set(0, WINDOW_Y, 0.44);
cylGrp.add(frame);

// glowing blue matter (opaque column) + bright core streak + metal piston plug on top
const liquid = capExtrude(0.52, 1.02, 0.26, matLiquid, 0.03);
liquid.position.set(0, WINDOW_Y - 0.12, 0.44);
liquid.renderOrder = 8;
cylGrp.add(liquid);
const plasma = capExtrude(0.4, 0.9, 0.2, matPlasma, 0.02);
plasma.position.set(0, WINDOW_Y - 0.12, 0.56);
plasma.renderOrder = 9;
cylGrp.add(plasma);
const plasmaCore = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.72, 0.1), matSpark);
plasmaCore.position.set(0, WINDOW_Y - 0.14, 0.66);
plasmaCore.renderOrder = 10;
cylGrp.add(plasmaCore);
// metal piston head at the top of the matter
const piston = new THREE.Mesh(new RoundedBoxGeometry(0.52, 0.24, 0.34, 3, 0.05), matSteelDark);
piston.position.set(0, WINDOW_Y + 0.46, 0.55);
cylGrp.add(piston);
const pistonBand = new THREE.Mesh(new THREE.BoxGeometry(0.54, 0.06, 0.36), matSteel);
pistonBand.position.set(0, WINDOW_Y + 0.34, 0.55);
cylGrp.add(pistonBand);
const pistonNub = cyl(0.07, 0.07, 0.12, matSteel, 16);
pistonNub.position.set(0, WINDOW_Y + 0.6, 0.55);
cylGrp.add(pistonNub);
// glass capsule set into the frame
const glass = capExtrude(0.6, 1.18, 0.14, matGlass, 0.05);
glass.position.set(0, WINDOW_Y, 0.62);
glass.renderOrder = 20;
cylGrp.add(glass);
// interior light + drifting motes
const coreLight = new THREE.PointLight(0x2f8bff, 2.2, 4.0, 2);
coreLight.position.set(CYLX, WINDOW_Y, 0.55);
machine.add(coreLight);
const motes = [];
for (let i = 0; i < 7; i++) {
  const mote = new THREE.Mesh(new THREE.SphereGeometry(0.035 + Math.random() * 0.028, 10, 10), matSpark);
  mote.userData = { x: (Math.random() - 0.5) * 0.34, phase: Math.random() * Math.PI * 2,
                    y: WINDOW_Y - 0.6 + Math.random() * 0.85, speed: 0.2 + Math.random() * 0.4 };
  mote.renderOrder = 11;
  motes.push(mote);
  cylGrp.add(mote);
}
const MOTE_LO = WINDOW_Y - 0.6, MOTE_HI = WINDOW_Y + 0.28;

// four polished guide posts framing the window sides
for (const phi of [-1.05, -0.72, 0.72, 1.05]) {
  const px = 0.72 * Math.sin(phi), pz = 0.72 * Math.cos(phi);
  const post = cyl(0.06, 0.06, 1.24, matSteel, 16);
  post.position.set(px, WINDOW_Y, pz);
  cylGrp.add(post);
  for (const cy of [WINDOW_Y - 0.6, WINDOW_Y + 0.6]) {
    const collar = cyl(0.09, 0.09, 0.13, matSteelDark, 16);
    collar.position.set(px, cy, pz);
    cylGrp.add(collar);
  }
}

// short cyan accent slot on the right shoulder of the body
{
  const phi = 1.2, px = 0.67 * Math.sin(phi), pz = 0.67 * Math.cos(phi);
  const acc = box(0.05, 0.42, 0.03, matGlow);
  acc.position.set(px, WINDOW_Y + 0.18, pz);
  acc.rotation.y = phi;
  cylGrp.add(acc);
}

// upper flange + shoulder + polished collar
addAt(cyl(0.86, 0.86, 0.14, matSteel, 48), DECK_Y + 2.05);
addAt(cyl(0.78, 0.8, 0.3, matSteelDark, 48), DECK_Y + 2.28);
addAt(cyl(0.64, 0.68, 0.2, matSteel, 48), DECK_Y + 2.52);
// keyed gland block (rounded square with a slotted top) where the piston rod exits
addAt(box(0.44, 0.34, 0.44, matSteelDark, 0.06), DECK_Y + 2.72);
for (const sx of [-0.12, 0.12]) {
  const jaw = box(0.12, 0.3, 0.18, matSteelDark, 0.03);
  jaw.position.set(sx, DECK_Y + 2.86, 0.0);
  cylGrp.add(jaw);
}
addAt(cyl(0.16, 0.18, 0.12, matSteel, 24), DECK_Y + 2.9);
const GLAND_TOP_Y = DECK_Y + 2.9;

/* piston rod + crosshead (animated) */
const pistonRod = cyl(0.09, 0.09, 1, matSteel, 16);
machine.add(pistonRod);
const crosshead = new THREE.Group();
const chBody = box(0.3, 0.4, 0.3, matSteelDark, 0.05); crosshead.add(chBody);
const chPin = cylZ(0.07, 0.07, 0.44, matSteel, 16); crosshead.add(chPin);
machine.add(crosshead);
// short link from beam right pin to crosshead
const linkMesh = cyl(0.07, 0.07, 1, matSteel, 14);
machine.add(linkMesh);
const LINK = 0.85;

/* ============================== auxiliary tank + pipe (right) ============================== */
const tank = box(0.85, 1.55, 0.68, matBodyDark, 0.12);
tank.position.set(4.72, DECK_Y + 0.85, 0.25);
machine.add(tank);
const tankCap = cyl(0.14, 0.16, 0.18, matSteelDark, 24);
tankCap.position.set(4.72, DECK_Y + 1.7, 0.25);
machine.add(tankCap);
// bright vertical cyan line centred on the tank front face
strip(machine, 0.05, 1.0, 4.72, DECK_Y + 0.9, 0.6);
// two diagonal vent slashes at the lower-right of the front face
for (const dy of [0.0, -0.14]) {
  const vent = box(0.2, 0.03, 0.02, matSteelDark);
  vent.position.set(4.95, DECK_Y + 0.5 + dy, 0.6);
  vent.rotation.z = -0.6;
  machine.add(vent);
}
// small greeble fitting at the tank base
const greeble = box(0.16, 0.2, 0.16, matBodyDark, 0.02);
greeble.position.set(4.36, DECK_Y + 0.12, 0.6);
machine.add(greeble);
const greebleCap = cyl(0.05, 0.06, 0.12, matSteelDark, 16);
greebleCap.position.set(4.36, DECK_Y + 0.28, 0.6);
machine.add(greebleCap);

const pipeCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(4.72, DECK_Y + 1.78, 0.25),
  new THREE.Vector3(4.72, DECK_Y + 2.15, 0.22),
  new THREE.Vector3(4.45, DECK_Y + 2.3, 0.1),
  new THREE.Vector3(4.28, DECK_Y + 2.18, 0.0)
]);
const pipe = new THREE.Mesh(new THREE.TubeGeometry(pipeCurve, 24, 0.07, 12), matSteel);
machine.add(pipe);
const pipeCollar = cyl(0.11, 0.11, 0.1, matSteelDark, 16);
pipeCollar.position.set(4.72, DECK_Y + 1.82, 0.25);
machine.add(pipeCollar);
// port where the pipe joins the cylinder body
const cylPort = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 0.2, 20), matSteelDark);
cylPort.position.set(4.2, DECK_Y + 2.14, 0.02);
cylPort.rotation.z = Math.PI / 2;
machine.add(cylPort);

/* small greeble: junction box on deck behind pylon */
const jbox = box(0.9, 0.35, 0.6, matBodyDark, 0.05);
jbox.position.set(1.9, DECK_Y + 0.16, -1.3);
machine.add(jbox);

/* ============================== shadows on everything ============================== */
machine.traverse(o => {
  if (o.isMesh) {
    o.castShadow = true;
    o.receiveShadow = true;
    if (o.material.transparent || o.material === matGlow) o.castShadow = false;
  }
});

/* ============================== post: bloom for the cyan strips ============================== */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.4, 0.55, 1.0);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ============================== kinematics ============================== */
const K = new THREE.Vector3(), E = new THREE.Vector3(), M = new THREE.Vector3();
const F = new THREE.Vector3(), T = new THREE.Vector3(), G = new THREE.Vector3(CYLX, GLAND_TOP_Y - 0.25, 0);
const A_AMP = CRANK_R / BEAM_L;   // beam swing amplitude, geometrically consistent
const clock = new THREE.Clock();
let theta = Math.PI / 3;

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  theta += dt * 1.5;

  const beta = -A_AMP * Math.sin(theta);
  beamGroup.rotation.z = beta;
  wheelGroup.rotation.z = theta;

  // left linkage: crank pin K -> knuckle M -> beam left pin E
  K.set(WX + CRANK_R * Math.cos(theta), WY + CRANK_R * Math.sin(theta), RODZ);
  E.set(PX - BEAM_L * Math.cos(beta), PY - BEAM_L * Math.sin(beta), RODZ);
  M.lerpVectors(K, E, 0.45);
  placeBetween(rodLower, K, M);
  placeBetween(rodUpper, M, E);
  knuckle.position.copy(M);
  bigEnd.position.copy(K);
  smallEnd.position.copy(E);

  // right linkage: beam right pin F -> crosshead T -> gland G
  F.set(PX + BEAM_R * Math.cos(beta), PY + BEAM_R * Math.sin(beta), 0);
  const dx = F.x - CYLX;
  T.set(CYLX, F.y - Math.sqrt(Math.max(LINK * LINK - dx * dx, 0.01)), 0);
  placeBetween(linkMesh, F, T);
  crosshead.position.copy(T);
  placeBetween(pistonRod, T, G);

  // pulsing glow + drifting motes for the blue matter
  const pulse = 0.65 + 0.35 * Math.sin(theta * 2.2);
  matPlasma.emissiveIntensity = 1.7 + 1.1 * pulse;
  matSpark.emissiveIntensity = 2.4 + 1.3 * pulse;
  coreLight.intensity = 1.8 + 1.4 * pulse;
  for (const m of motes) {
    m.userData.y += dt * m.userData.speed;
    if (m.userData.y > MOTE_HI) m.userData.y = MOTE_LO;
    const sway = 0.04 * Math.sin(theta * 1.5 + m.userData.phase);
    m.position.set(m.userData.x + sway, m.userData.y, 0.62);
  }

  controls.update();
  composer.render();
}
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
