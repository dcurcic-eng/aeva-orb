<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AEVA — Glass Gyroscope (R3F)</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#989c9f; overflow:hidden; font-family:'Segoe UI', system-ui, sans-serif; }
  #root { width:100%; height:100%; }
  .loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:#555; font-size:12px; letter-spacing:3px; text-transform:uppercase; z-index:5; }
  .badge { position:fixed; left:18px; bottom:16px; color:#4a4f54; font-size:11px; letter-spacing:2px;
    text-transform:uppercase; z-index:6; opacity:.7; pointer-events:none; }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "three": "https://esm.sh/three@0.160.0",
    "three/examples/jsm/loaders/SVGLoader.js": "https://esm.sh/three@0.160.0/examples/jsm/loaders/SVGLoader.js?external=three",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?external=react,react-dom,three",
    "@react-three/drei": "https://esm.sh/@react-three/drei@9.114.3?external=react,react-dom,three,@react-three/fiber",
    "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.3?external=react,three,@react-three/fiber"
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div class="loading" id="loading">Loading…</div>
<div class="badge">AEVA · Glass Gyroscope</div>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useRef, useMemo, useEffect, Suspense } from 'react'
import { createRoot } from 'react-dom/client'
import * as THREE from 'three'
import { Canvas, useFrame } from '@react-three/fiber'
import { Environment, Lightformer, OrbitControls, MeshReflectorMaterial, ContactShadows } from '@react-three/drei'
import { EffectComposer, Bloom, Vignette } from '@react-three/postprocessing'
import { SVGLoader } from 'three/examples/jsm/loaders/SVGLoader.js'

/* ============================================================
   Palette & shared materials — the machined chrome rings are
   now clear refractive glass; cyan neon accents preserved.
   ============================================================ */
const CYAN       = '#3fdcff'
const CYAN_DEEP  = '#18b8e8'

function useMats() {
  return useMemo(() => {
    /* Primary clear glass — shared across every ring, spoke and ball
       for performance (single transmissive PhysicalMaterial). */
    const glass = new THREE.MeshPhysicalMaterial({
      color: '#eaf7ff', metalness: 0, roughness: 0.04,
      transmission: 1.0, thickness: 0.6, ior: 1.5,
      envMapIntensity: 1.6, clearcoat: 1.0, clearcoatRoughness: 0.06,
      transparent: true, side: THREE.DoubleSide, specularIntensity: 1.0,
      attenuationColor: new THREE.Color('#bfefff'), attenuationDistance: 4.0
    })
    /* Slightly frostier glass for smaller hardware, adds visual depth */
    const glassFrost = new THREE.MeshPhysicalMaterial({
      color: '#dff0fb', metalness: 0, roughness: 0.18,
      transmission: 0.92, thickness: 0.35, ior: 1.48,
      envMapIntensity: 1.3, clearcoat: 0.8, clearcoatRoughness: 0.2,
      transparent: true, side: THREE.DoubleSide
    })
    const glow = new THREE.MeshStandardMaterial({
      color: '#02222e', emissive: CYAN, emissiveIntensity: 2.6, toneMapped: false,
      metalness: 0, roughness: 0.4
    })
    const glowSoft = new THREE.MeshStandardMaterial({
      color: '#02222e', emissive: CYAN_DEEP, emissiveIntensity: 1.6, toneMapped: false,
      metalness: 0, roughness: 0.5
    })
    return { glass, glassFrost, glow, glowSoft }
  }, [])
}

/* ============================================================
   Geometry helpers
   ============================================================ */

/* Flat rectangular-section ring (annulus extruded) */
function ringGeo(inner, outer, depth) {
  const s = new THREE.Shape()
  s.absarc(0, 0, outer, 0, Math.PI * 2, false)
  const h = new THREE.Path()
  h.absarc(0, 0, inner, 0, Math.PI * 2, true)
  s.holes.push(h)
  const g = new THREE.ExtrudeGeometry(s, {
    depth, bevelEnabled: true, bevelThickness: 0.012, bevelSize: 0.012,
    bevelSegments: 2, curveSegments: 128
  })
  g.translate(0, 0, -depth / 2)
  return g
}

/* ============================================================
   AEVA "A" mark — extruded SVG with baked brand gradient,
   sits at the core and spins on its own
   ============================================================ */
const SVG_A = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 551 541">
<path d="M111.369 282.731C116.625 261.482 127.872 254.94 144.912 256.268C161.472 257.596 178.23 256.526 201.685 256.526C185.747 297.63 171.9 333.355 156.781 372.418H391.163C335.83 247.004 282.279 125.639 226.949 0.257968C256.847 0.257968 282.082 -0.64895 307.204 0.938156C312.969 1.32683 320.769 8.71173 323.622 15.1573C397.973 183.423 471.786 351.98 545.57 520.57C547.52 525.04 548.254 530.253 550.826 539.81C523.414 539.81 498.405 541.073 473.594 538.903C467.688 538.384 459.522 527.502 457.542 519.695C443.215 463.823 411.452 450.348 362.564 454.073C289.881 459.612 216.605 455.855 143.613 455.238C127.985 455.078 119.112 459.677 111.991 477.555C86.6989 541.267 85.9357 540.877 24.6136 540.068C17.9445 539.939 11.2754 539.161 0 538.352C37.8671 451.417 74.2083 367.915 111.369 282.568V282.731Z"/>
</svg>`
const LOGO_DARK  = new THREE.Color('#2F6873')
const LOGO_LIGHT = new THREE.Color('#7fe0f2')

function buildLogoGeometry(targetHeight = 0.34) {
  const loader = new SVGLoader()
  const data = loader.parse(SVG_A)
  const shapes = data.paths.flatMap(p => SVGLoader.createShapes(p))
  const geometry = new THREE.ExtrudeGeometry(shapes, {
    depth: 80, steps: 1, curveSegments: 24,
    bevelEnabled: true, bevelThickness: 7, bevelSize: 7, bevelSegments: 5
  })
  const scale = targetHeight / 541
  geometry.scale(scale, scale, scale)
  geometry.center()
  // Bake brand gradient into vertex colors (SVG space is y-down)
  geometry.computeBoundingBox()
  const bb = geometry.boundingBox
  const pos = geometry.getAttribute('position')
  const colors = new Float32Array(pos.count * 3)
  const tmp = new THREE.Color()
  const h = bb.max.y - bb.min.y, w = bb.max.x - bb.min.x
  for (let i = 0; i < pos.count; i++) {
    const ty = (bb.max.y - pos.getY(i)) / h
    const tx = (pos.getX(i) - bb.min.x) / w
    const t = THREE.MathUtils.clamp(0.85 * ty + 0.15 * tx, 0, 1)
    tmp.lerpColors(LOGO_DARK, LOGO_LIGHT, t)
    colors[i * 3] = tmp.r; colors[i * 3 + 1] = tmp.g; colors[i * 3 + 2] = tmp.b
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3))
  return geometry
}

function Logo() {
  const spin = useRef()
  const geometry = useMemo(() => buildLogoGeometry(0.34), [])
  useEffect(() => () => geometry.dispose(), [geometry])
  useFrame((_, delta) => { spin.current.rotation.y += delta * 0.9 })
  return (
    <group ref={spin}>
      {/* SVG is y-down; flip 180° about X to sit upright */}
      <mesh geometry={geometry} rotation={[Math.PI, 0, 0]}>
        <meshPhysicalMaterial
          color="#ffffff" metalness={0.2} roughness={0.18}
          clearcoat={1} clearcoatRoughness={0.15}
          emissive="#ffffff" emissiveIntensity={0.28}
          envMapIntensity={1.2} />
      </mesh>
    </group>
  )
}

/* ============================================================
   Gimbal rings — each spins CONTINUOUSLY around its own axis
   ============================================================ */
function Gimbal({ mats, yc }) {
  const g1 = useRef()   // outer ring  → spins on horizontal X pivot axis
  const g2 = useRef()   // middle ring → spins on its vertical Y axis
  const rotor = useRef() // core rotor  → fast spin on its own spindle
  const orbMat = useRef()
  const halo = useRef()

  useFrame((state, delta) => {
    const t = state.clock.elapsedTime
    g1.current.rotation.x += delta * 0.32
    g2.current.rotation.y += delta * 0.55
    rotor.current.rotation.y += delta * 2.1
    const pulse = 2.3 + Math.sin(t * 2.4) * 0.5
    orbMat.current.emissiveIntensity = pulse
    if (halo.current) halo.current.material.opacity = 0.16 + Math.sin(t * 2.4) * 0.05
  })

  const outerGeo  = useMemo(() => ringGeo(1.38, 1.52, 0.10), [])
  const midGeo    = useMemo(() => ringGeo(1.08, 1.20, 0.08), [])
  const bandGeo   = useMemo(() => ringGeo(0.72, 1.02, 0.05), [])
  const innerGeo  = useMemo(() => ringGeo(0.58, 0.66, 0.05), [])

  const GlowLoop = ({ r, tube = 0.013, rot = [0, 0, 0], mat = mats.glow }) => (
    <mesh rotation={rot} material={mat}>
      <torusGeometry args={[r, tube, 10, 160]} />
    </mesh>
  )

  const Ball = ({ p, r = 0.05 }) => (
    <mesh position={p} material={mats.glass}>
      <sphereGeometry args={[r, 24, 24]} />
    </mesh>
  )

  return (
    <group position={[0, yc, 0]}>
      {/* AEVA mark suspended at the core, spinning independently
          while the rings orbit around it */}
      <Logo />
      {/* ------ outer gimbal: full revolutions about the X pivot axis ------ */}
      <group ref={g1}>
        <mesh geometry={outerGeo} material={mats.glass} />
        <GlowLoop r={1.40} />
        {/* stub shafts where the yoke hubs used to grip */}
        {[1, -1].map(s => (
          <mesh key={s} material={mats.glassFrost} position={[s * 1.60, 0, 0]} rotation={[0, 0, Math.PI / 2]}>
            <cylinderGeometry args={[0.04, 0.04, 0.22, 24]} />
          </mesh>
        ))}
        {/* bearings for the middle ring, top & bottom */}
        {[1, -1].map(s => (
          <group key={s}>
            <mesh material={mats.glassFrost} position={[0, s * 1.29, 0]}>
              <cylinderGeometry args={[0.032, 0.032, 0.20, 20]} />
            </mesh>
            <Ball p={[0, s * 1.36, 0]} r={0.055} />
          </group>
        ))}

        {/* ------ middle gimbal: continuous spin about vertical Y ------ */}
        <group ref={g2}>
          <mesh geometry={midGeo} material={mats.glass} />
          <GlowLoop r={1.10} tube={0.011} />
          {/* axle bearings for the rotor */}
          {[1, -1].map(s => <Ball key={s} p={[0, s * 1.05, 0]} r={0.05} />)}

          {/* ------ rotor: fast spin around its own spindle ------ */}
          <group ref={rotor}>
            {/* wide flat equatorial band */}
            <mesh geometry={bandGeo} rotation={[Math.PI / 2, 0, 0]} material={mats.glass} />
            <GlowLoop r={0.735} tube={0.012} rot={[Math.PI / 2, 0, 0]} />
            <GlowLoop r={1.005} tube={0.009} rot={[Math.PI / 2, 0, 0]} mat={mats.glowSoft} />

            {/* inner vertical ring */}
            <mesh geometry={innerGeo} material={mats.glass} />
            <GlowLoop r={0.60} tube={0.009} mat={mats.glowSoft} />

            {/* vertical spindle */}
            <mesh material={mats.glassFrost}>
              <cylinderGeometry args={[0.024, 0.024, 2.06, 20]} />
            </mesh>
            {[0.26, -0.26].map(y => (
              <mesh key={y} material={mats.glassFrost} position={[0, y, 0]}>
                <cylinderGeometry args={[0.045, 0.045, 0.09, 20]} />
              </mesh>
            ))}

            {/* four spokes with ball joints, orb → flat band */}
            {[0, 1, 2, 3].map(k => {
              const a = (k * Math.PI) / 2
              const dx = Math.round(Math.cos(a)), dz = Math.round(Math.sin(a))
              return (
                <group key={k}>
                  <mesh material={mats.glassFrost}
                        position={[dx * 0.445, 0, dz * 0.445]}
                        rotation={[dz !== 0 ? Math.PI / 2 : 0, 0, dx !== 0 ? Math.PI / 2 : 0]}>
                    <cylinderGeometry args={[0.020, 0.020, 0.53, 16]} />
                  </mesh>
                  <Ball p={[dx * 0.70, 0, dz * 0.70]} r={0.05} />
                  <Ball p={[dx * 0.34, 0, dz * 0.34]} r={0.034} />
                </group>
              )
            })}

            {/* glowing plasma core — translucent so the AEVA mark
                inside stays visible */}
            <mesh>
              <sphereGeometry args={[0.30, 48, 48]} />
              <meshStandardMaterial ref={orbMat} color="#032a38" emissive={CYAN}
                emissiveIntensity={2.3} toneMapped={false} roughness={0.25}
                transparent opacity={0.32} depthWrite={false} />
            </mesh>
            <mesh ref={halo}>
              <sphereGeometry args={[0.27, 32, 32]} />
              <meshBasicMaterial color={CYAN} transparent opacity={0.16}
                blending={THREE.AdditiveBlending} depthWrite={false} toneMapped={false} />
            </mesh>
            <pointLight color={CYAN} intensity={2.6} distance={7} decay={2} />
          </group>
        </group>
      </group>
    </group>
  )
}

/* ============================================================
   Studio environment — seamless gray cyc; the HDRI-like
   Environment is what gives the glass its reflections/refraction
   ============================================================ */
function Studio() {
  return (
    <>
      <color attach="background" args={['#9b9fa2']} />
      <fog attach="fog" args={['#9b9fa2', 12, 34]} />
      <ambientLight intensity={0.22} />

      <Environment resolution={256} frames={1}>
        <Lightformer form="rect" intensity={3} position={[0, 7, 0]} rotation-x={Math.PI / 2} scale={[9, 9, 1]} />
        <Lightformer form="rect" intensity={1.4} position={[-7, 3, 1]} rotation-y={Math.PI / 2} scale={[7, 3.5, 1]} />
        <Lightformer form="rect" intensity={1.4} position={[7, 3, 1]} rotation-y={-Math.PI / 2} scale={[7, 3.5, 1]} />
        <Lightformer form="rect" intensity={0.8} position={[0, 3.5, 9]} scale={[11, 4, 1]} />
        <Lightformer form="rect" intensity={0.5} position={[0, 2, -9]} scale={[10, 4, 1]} />
      </Environment>

      {/* softly reflective studio floor */}
      <mesh rotation-x={-Math.PI / 2} position={[0, -0.002, 0]}>
        <planeGeometry args={[70, 70]} />
        <MeshReflectorMaterial
          blur={[380, 120]} resolution={1024} mixBlur={1} mixStrength={0.3}
          roughness={0.95} depthScale={1.1} minDepthThreshold={0.4} maxDepthThreshold={1.4}
          color="#8f9396" metalness={0.1} mirror={0.18} />
      </mesh>
      <ContactShadows position={[0, 0.004, 0]} scale={7} blur={2.8} far={3} opacity={0.4} />
    </>
  )
}

/* ============================================================
   App — pedestal removed; the gimbal floats, centred in frame
   ============================================================ */
const YC = 1.85         // gimbal centre height (clears the floor)

function App() {
  useEffect(() => {
    const el = document.getElementById('loading')
    if (el) el.style.display = 'none'
  }, [])

  return (
    <Canvas dpr={[1, 2]} gl={{ antialias: true }}
            camera={{ position: [0.4, 1.9, 6.4], fov: 34 }}>
      <Suspense fallback={null}>
        <Studio />
        <Gimbal mats={useMats()} yc={YC} />
        <EffectComposer multisampling={4}>
          <Bloom luminanceThreshold={1.0} luminanceSmoothing={0.2} intensity={1.0} mipmapBlur radius={0.7} />
          <Vignette offset={0.22} darkness={0.55} />
        </EffectComposer>
        <OrbitControls target={[0, YC, 0]} enableDamping dampingFactor={0.08}
          autoRotate autoRotateSpeed={0.5} minDistance={3.5} maxDistance={14}
          maxPolarAngle={Math.PI * 0.58} />
      </Suspense>
    </Canvas>
  )
}

createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
