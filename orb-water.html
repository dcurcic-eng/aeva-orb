<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Water Orb — AEVA Logo Inside</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #e7eaed; }
  #root { width: 100%; height: 100%; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #59C4D9; letter-spacing: 0.35em; font-size: 13px; text-transform: uppercase;
    font-family: 'Segoe UI', system-ui, sans-serif;
    animation: pulse 1.6s ease-in-out infinite; pointer-events: none; z-index: 10;
  }
  @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "three": "https://esm.sh/three@0.169.0",
    "three/examples/jsm/loaders/SVGLoader.js": "https://esm.sh/three@0.169.0/examples/jsm/loaders/SVGLoader.js?external=three",
    "three/examples/jsm/environments/RoomEnvironment.js": "https://esm.sh/three@0.169.0/examples/jsm/environments/RoomEnvironment.js?external=three",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?external=react,react-dom,three"
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div id="loading">Loading</div>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useMemo, useEffect, useRef } from 'react'
import { createRoot } from 'react-dom/client'
import * as THREE from 'three'
import { Canvas, useThree, useFrame } from '@react-three/fiber'
import { SVGLoader } from 'three/examples/jsm/loaders/SVGLoader.js'
import { RoomEnvironment } from 'three/examples/jsm/environments/RoomEnvironment.js'

const DPR = Math.min(window.devicePixelRatio, 2).toFixed(1)

// ---------- Shared GLSL: simplex noise + wavy watery warp ----------
const NOISE_GLSL = /* glsl */`
vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0) * 2.0 + 1.0;
  vec4 s1 = floor(b1) * 2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

uniform float uTime;
uniform float uAmp;
uniform float uFreq;
uniform float uHover;   // 0 = cursor away, 1 = hovering
uniform float uRadius;  // size of the dent around the cursor
uniform vec3 uMouse;    // object-space cursor point on the orb

// Wavy surface: many small undulations rather than big lumps, so the
// silhouette wiggles like water while the ball stays round overall
float displace(vec3 p){
  float n = snoise(p * uFreq + vec3(0.0, uTime * 0.15, uTime * 0.10));
  n += 0.4 * snoise(p * uFreq * 2.1 + vec3(uTime * 0.22, 0.0, uTime * 0.12));
  return n * uAmp;
}

vec3 warpWater(vec3 pIn){
  vec3 dir = normalize(pIn);
  vec3 pos = dir * (1.0 + displace(dir));

  // The cursor presses into the surface like a finger on water:
  // a soft dent under the pointer with a gentle raised ring around it
  float d = distance(pos, uMouse);
  float f = 1.0 - smoothstep(0.0, uRadius, d);
  f = f * f;
  float ring = f * (1.0 - f) * 4.0;
  float wobble = 1.0 + 0.15 * snoise(pos * 3.0 + vec3(0.0, uTime * 0.6, 0.0));
  pos -= dir * 0.22 * f * wobble * uHover;
  pos += dir * 0.05 * ring * uHover;
  return pos;
}
`

const WATER_VERTEX = NOISE_GLSL + /* glsl */`
varying vec3 vNormal;
varying vec3 vWorldPos;
varying vec3 vPos;
void main(){
  vec3 displaced = warpWater(position);

  // Recompute the normal from neighboring warped points so the
  // waves and the dent catch the light
  vec3 n0 = normalize(position);
  vec3 t = normalize(cross(n0, vec3(0.0, 1.0, 0.001)));
  vec3 b = normalize(cross(n0, t));
  float e = 0.02;
  vec3 pt = warpWater(position + t * e);
  vec3 pb = warpWater(position + b * e);
  vNormal = normalize(normalMatrix * normalize(cross(pt - displaced, pb - displaced)));

  vPos = position;
  vec4 wp = modelMatrix * vec4(displaced, 1.0);
  vWorldPos = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`

const WATER_FRAGMENT = NOISE_GLSL + /* glsl */`
uniform vec3 uLight;
uniform vec3 uBlue;
uniform vec3 uPurple;
varying vec3 vNormal;
varying vec3 vWorldPos;
varying vec3 vPos;
void main(){
  vec3 V = normalize(cameraPosition - vWorldPos);
  vec3 N = normalize(vNormal);
  float facing = clamp(dot(V, N), 0.0, 1.0);
  float fres = pow(1.0 - facing, 2.0);

  // Soft gradient: near-white light blue flowing into periwinkle,
  // drifting slowly so it feels liquid
  float swirl = snoise(vPos * 1.4 + vec3(0.0, uTime * 0.08, uTime * 0.05)) * 0.5 + 0.5;
  float grad = clamp(vPos.y * 0.4 + 0.5 + (swirl - 0.5) * 0.3, 0.0, 1.0);
  vec3 col = mix(uBlue, uLight, grad);

  // A whisper of light purple through the middle band
  float purpleBand = smoothstep(0.15, 0.5, grad) * (1.0 - smoothstep(0.5, 0.9, grad));
  col = mix(col, uPurple, purpleBand * 0.22);

  // Soft milky-white patches, kept away from the center so the
  // logo stays readable through the front face
  float cloud = snoise(vPos * 1.9 + vec3(uTime * 0.06, uTime * 0.04, 0.0)) * 0.5 + 0.5;
  float edgeWeight = 1.0 - facing; // 0 at the center, 1 at the rim
  col = mix(col, vec3(1.0), cloud * 0.30 * (0.35 + 0.65 * edgeWeight));

  // Frosted white rim
  col = mix(col, vec3(1.0), clamp(fres * 1.0, 0.0, 1.0));

  // Light mirroring: kept toward the rim; the sharp reflection sits
  // upper right, the sheen fades out over the center
  vec3 L = normalize(vec3(0.7, 0.5, 0.45));
  float ndl = max(dot(N, L), 0.0);
  float mirror = pow(ndl, 22.0) * 1.0 + pow(ndl, 3.0) * 0.28 * (0.3 + 0.7 * edgeWeight);
  vec3 L2 = normalize(vec3(-0.6, -0.35, 0.5));
  mirror += pow(max(dot(N, L2), 0.0), 14.0) * 0.4;
  col += vec3(mirror);

  // Light body, clearest in the middle so the logo shows through
  float alpha = 0.26 + 0.58 * fres + mirror * 0.35 + cloud * 0.08 * edgeWeight;
  gl_FragColor = vec4(col, clamp(alpha, 0.0, 0.95));
}
`

const INNER_VERTEX = NOISE_GLSL + /* glsl */`
varying vec3 vPos;
void main(){
  vec3 displaced = warpWater(position);
  vPos = position;
  gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(displaced, 1.0);
}
`

const INNER_FRAGMENT = NOISE_GLSL + /* glsl */`
uniform vec3 uLight;
uniform vec3 uBlue;
uniform vec3 uPurple;
varying vec3 vPos;
void main(){
  float grad = clamp(vPos.y * 0.4 + 0.5, 0.0, 1.0);
  vec3 col = mix(uBlue, uLight, grad);
  float purpleBand = smoothstep(0.15, 0.5, grad) * (1.0 - smoothstep(0.5, 0.9, grad));
  col = mix(col, uPurple, purpleBand * 0.18);
  float milk = snoise(vPos * 1.8 + vec3(uTime * 0.05)) * 0.5 + 0.5;
  gl_FragColor = vec4(mix(col, vec3(1.0), 0.35 * milk), 0.20);
}
`

const GRID_VERTEX = NOISE_GLSL + /* glsl */`
varying float vA;
void main(){
  vec3 dir = normalize(position);
  // Ride just above the watery surface so the dots wave with it
  vec3 p = warpWater(position) * 1.006;

  vec4 mv = modelViewMatrix * vec4(p, 1.0);
  gl_PointSize = 2.7 * (300.0 / -mv.z) * 0.01 * min(2.0, ${DPR});
  gl_PointSize = max(gl_PointSize, 1.3);
  gl_Position = projectionMatrix * mv;

  // Crisp on the front face, fading toward the rim
  vec3 nView = normalize(normalMatrix * dir);
  vec3 viewDir = normalize(-mv.xyz);
  float facing = clamp(dot(viewDir, nView), 0.0, 1.0);
  vA = smoothstep(0.04, 0.5, facing) * 0.85;
}
`

const GRID_FRAGMENT = /* glsl */`
varying float vA;
void main(){
  float d = length(gl_PointCoord - 0.5);
  float a = smoothstep(0.5, 0.24, d) * vA;
  if (a < 0.01) discard;
  gl_FragColor = vec4(1.0, 1.0, 1.0, a);
}
`

// ---------- The watery orb with dot grid and hover dent ----------
function WaterOrb() {
  const group = useRef()
  const hover = useRef(0)
  const hovered = useRef(false)
  const mouseWorld = useRef(new THREE.Vector3(0, 0, 1.2))
  const mouseSmoothed = useRef(new THREE.Vector3(0, 0, 1.2))

  const uniforms = useMemo(() => ({
    uTime:   { value: 0 },
    uAmp:    { value: 0.042 },
    uFreq:   { value: 1.9 },
    uHover:  { value: 0 },
    uRadius: { value: 0.75 },
    uMouse:  { value: new THREE.Vector3(0, 0, 1.2) },
    uLight:  { value: new THREE.Color('#dceffa') }, // light blue
    uBlue:   { value: new THREE.Color('#5fbfd6') }, // teal
    uPurple: { value: new THREE.Color('#c3b6f5') }, // light purple accent
  }), [])

  const waterMaterial = useMemo(() => new THREE.ShaderMaterial({
    uniforms, transparent: true, depthWrite: false, side: THREE.FrontSide,
    vertexShader: WATER_VERTEX, fragmentShader: WATER_FRAGMENT,
  }), [uniforms])

  const innerMaterial = useMemo(() => new THREE.ShaderMaterial({
    uniforms, transparent: true, depthWrite: false, side: THREE.BackSide,
    vertexShader: INNER_VERTEX, fragmentShader: INNER_FRAGMENT,
  }), [uniforms])

  const gridMaterial = useMemo(() => new THREE.ShaderMaterial({
    uniforms, transparent: true, depthWrite: false,
    vertexShader: GRID_VERTEX, fragmentShader: GRID_FRAGMENT,
  }), [uniforms])

  useFrame((state, delta) => {
    const dt = Math.min(delta, 0.05)
    const t = state.clock.elapsedTime
    uniforms.uTime.value = t

    const breathe = 1.0 + 0.012 * Math.sin(t * 0.6)
    group.current.scale.setScalar(breathe)
    group.current.rotation.y = t * 0.05

    // Damped spring: the dent presses in quickly, relaxes slower
    const target = hovered.current ? 1 : 0
    hover.current += (target - hover.current) * (1 - Math.exp(-dt * (hovered.current ? 7 : 3.2)))
    uniforms.uHover.value = hover.current

    // Smooth the cursor point, hand it to the shaders in orb-local space
    mouseSmoothed.current.lerp(mouseWorld.current, 1 - Math.exp(-dt * 12))
    uniforms.uMouse.value.copy(group.current.worldToLocal(mouseSmoothed.current.clone()))
  })

  return (
    <group ref={group}>
      {/* Invisible round hit surface so the dent tracks the cursor */}
      <mesh
        onPointerMove={(e) => { hovered.current = true; mouseWorld.current.copy(e.point) }}
        onPointerOut={() => { hovered.current = false }}
      >
        <sphereGeometry args={[1.08, 32, 32]} />
        <meshBasicMaterial colorWrite={false} depthWrite={false} />
      </mesh>

      <mesh material={innerMaterial} renderOrder={0}>
        <sphereGeometry args={[1, 140, 140]} />
      </mesh>
      <mesh material={waterMaterial} renderOrder={1}>
        <sphereGeometry args={[1, 240, 240]} />
      </mesh>
      <points material={gridMaterial} renderOrder={2} frustumCulled={false}>
        <sphereGeometry args={[1, 168, 84]} />
      </points>
    </group>
  )
}

// ---------- AEVA 3D logo inside the orb ----------
// The "A" mark path from aeva-logo-teal.svg (first path of the wordmark)
const SVG_A = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 551 541">
<path d="M111.369 282.731C116.625 261.482 127.872 254.94 144.912 256.268C161.472 257.596 178.23 256.526 201.685 256.526C185.747 297.63 171.9 333.355 156.781 372.418H391.163C335.83 247.004 282.279 125.639 226.949 0.257968C256.847 0.257968 282.082 -0.64895 307.204 0.938156C312.969 1.32683 320.769 8.71173 323.622 15.1573C397.973 183.423 471.786 351.98 545.57 520.57C547.52 525.04 548.254 530.253 550.826 539.81C523.414 539.81 498.405 541.073 473.594 538.903C467.688 538.384 459.522 527.502 457.542 519.695C443.215 463.823 411.452 450.348 362.564 454.073C289.881 459.612 216.605 455.855 143.613 455.238C127.985 455.078 119.112 459.677 111.991 477.555C86.6989 541.267 85.9357 540.877 24.6136 540.068C17.9445 539.939 11.2754 539.161 0 538.352C37.8671 451.417 74.2083 367.915 111.369 282.568V282.731Z"/>
</svg>`

const COLOR_DARK = new THREE.Color('#2F6873')
const COLOR_LIGHT = new THREE.Color('#59C4D9')

function buildLogoGeometry() {
  const loader = new SVGLoader()
  const data = loader.parse(SVG_A)
  const shapes = data.paths.flatMap((p) => SVGLoader.createShapes(p))

  const geometry = new THREE.ExtrudeGeometry(shapes, {
    depth: 80,
    steps: 1,
    curveSegments: 24,
    bevelEnabled: true,
    bevelThickness: 7,
    bevelSize: 7,
    bevelSegments: 5,
  })

  // ~1.15 world units tall so it sits comfortably inside the radius-1 orb
  const scale = 1.15 / 541
  geometry.scale(scale, scale, scale)
  geometry.center()

  // Bake the brand gradient into vertex colors.
  // SVG space is y-down, so the visual TOP of the logo has the SMALLEST y here.
  geometry.computeBoundingBox()
  const bb = geometry.boundingBox
  const pos = geometry.getAttribute('position')
  const colors = new Float32Array(pos.count * 3)
  const tmp = new THREE.Color()
  const h = bb.max.y - bb.min.y
  const w = bb.max.x - bb.min.x
  for (let i = 0; i < pos.count; i++) {
    const ty = (bb.max.y - pos.getY(i)) / h // 1 at visual top
    const tx = (pos.getX(i) - bb.min.x) / w
    const t = THREE.MathUtils.clamp(0.85 * ty + 0.15 * tx, 0, 1)
    tmp.lerpColors(COLOR_DARK, COLOR_LIGHT, t)
    colors[i * 3] = tmp.r
    colors[i * 3 + 1] = tmp.g
    colors[i * 3 + 2] = tmp.b
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3))
  return geometry
}

function LogoMark() {
  const group = useRef()
  const geometry = useMemo(() => buildLogoGeometry(), [])
  useEffect(() => () => geometry.dispose(), [geometry])

  // Point the mark toward the mouse with smooth damping; breathe with the orb
  useFrame((state, delta) => {
    const { pointer, clock } = state
    const targetY = pointer.x * 0.7   // look left/right
    const targetX = -pointer.y * 0.55 // look up/down
    group.current.rotation.y = THREE.MathUtils.damp(group.current.rotation.y, targetY, 6, delta)
    group.current.rotation.x = THREE.MathUtils.damp(group.current.rotation.x, targetX, 6, delta)
    group.current.scale.setScalar(1.0 + 0.012 * Math.sin(clock.elapsedTime * 0.6))
  })

  return (
    <group ref={group}>
      {/* SVG is y-down; a 180° rotation about X flips it upright
          without mirroring winding order */}
      <mesh geometry={geometry} rotation={[Math.PI, 0, 0]}>
        <meshPhysicalMaterial
          vertexColors
          metalness={0.35}
          roughness={0.22}
          clearcoat={1}
          clearcoatRoughness={0.15}
          envMapIntensity={1.1}
        />
      </mesh>
    </group>
  )
}

// ---------- Soft halo glow behind the orb ----------
function Halo() {
  const texture = useMemo(() => {
    const c = document.createElement('canvas')
    c.width = c.height = 512
    const ctx = c.getContext('2d')
    const g = ctx.createRadialGradient(256, 256, 0, 256, 256, 256)
    g.addColorStop(0.0, 'rgba(255,255,255,0.75)')
    g.addColorStop(0.4, 'rgba(224,246,252,0.35)')
    g.addColorStop(0.7, 'rgba(203,238,248,0.12)')
    g.addColorStop(1.0, 'rgba(203,238,248,0.0)')
    ctx.fillStyle = g
    ctx.fillRect(0, 0, 512, 512)
    return new THREE.CanvasTexture(c)
  }, [])

  return (
    <sprite scale={[3.4, 3.4, 1]} renderOrder={-1}>
      <spriteMaterial map={texture} transparent depthWrite={false} depthTest={false} />
    </sprite>
  )
}

// Offline-safe image-based lighting for the logo (no HDR download needed)
function Env() {
  const { gl, scene } = useThree()
  useEffect(() => {
    const pmrem = new THREE.PMREMGenerator(gl)
    const envMap = pmrem.fromScene(new RoomEnvironment(), 0.04).texture
    scene.environment = envMap
    return () => {
      scene.environment = null
      envMap.dispose()
      pmrem.dispose()
    }
  }, [gl, scene])
  return null
}

function App() {
  useEffect(() => {
    const el = document.getElementById('loading')
    if (el) el.style.display = 'none'
  }, [])

  return (
    <Canvas
      dpr={[1, 2]}
      camera={{ position: [0, 0, 4.2], fov: 40 }}
      gl={{ antialias: true }}
    >
      <color attach="background" args={['#e7eaed']} />
      <ambientLight intensity={0.35} />
      <directionalLight position={[5, 8, 6]} intensity={1.4} />
      <directionalLight position={[-6, -2, -4]} intensity={0.4} color="#59C4D9" />
      <Env />
      <Halo />
      <WaterOrb />
      <LogoMark />
    </Canvas>
  )
}

createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
