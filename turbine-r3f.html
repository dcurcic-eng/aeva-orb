import React, { useRef, useMemo, Suspense } from 'react'
import { createRoot } from 'react-dom/client'
import * as THREE from 'three'
import { Canvas, useFrame } from '@react-three/fiber'
import { Environment, Lightformer, OrbitControls } from '@react-three/drei'
import { EffectComposer, Bloom, Vignette } from '@react-three/postprocessing'

/* ================= fan parameters ================= */
const BLADES = 22
const R_ROOT = 1.12          // blade root radius (hub edge)
const R_TIP  = 3.55          // blade tip radius
const SWEEP  = 1.25          // total backsweep (rad) root→tip
const STEP   = Math.PI * 2 / BLADES

const lerp = (a, b, t) => a + (b - a) * t

/* blade surface point in rotor space.
   u: 0..1 span (root→tip), v: 0..1 chord (leading→trailing edge) */
function bladePoint(u, v, out) {
  const r     = lerp(R_ROOT, R_TIP, u)
  const chord = lerp(0.66, 0.50, u)                       // angular chord width
  const theta = -SWEEP * Math.pow(u, 1.35) + (v - 0.5) * chord
  /* pitch: leading edge lifted toward viewer, plus gentle camber scoop */
  const tilt   = lerp(0.55, 0.30, u)
  const camber = Math.sin(Math.PI * v) * lerp(0.10, 0.16, u)
  const z = (0.5 - v) * tilt * lerp(0.55, 1.0, u) - camber - u * 0.12
  out.set(r * Math.cos(theta), r * Math.sin(theta), z)
  return out
}

/* ================= geometry builders ================= */
function useBladeGeometry() {
  return useMemo(() => {
    const NU = 26, NV = 14
    const geo = new THREE.BufferGeometry()
    const pos = new Float32Array((NU + 1) * (NV + 1) * 3)
    const uv  = new Float32Array((NU + 1) * (NV + 1) * 2)
    const idx = []
    const p = new THREE.Vector3()
    let k = 0
    for (let i = 0; i <= NU; i++) {
      for (let j = 0; j <= NV; j++) {
        bladePoint(i / NU, j / NV, p)
        pos[k * 3] = p.x; pos[k * 3 + 1] = p.y; pos[k * 3 + 2] = p.z
        uv[k * 2] = i / NU; uv[k * 2 + 1] = j / NV
        k++
      }
    }
    for (let i = 0; i < NU; i++) {
      for (let j = 0; j < NV; j++) {
        const a = i * (NV + 1) + j
        const b = a + NV + 1
        idx.push(a, b, a + 1, b, b + 1, a + 1)
      }
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
    geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2))
    geo.setIndex(idx)
    geo.computeVertexNormals()
    return geo
  }, [])
}

/* rivet positions along a blade (near the leading edge) */
function useRivetTransforms() {
  return useMemo(() => {
    const list = []
    const p = new THREE.Vector3()
    for (let n = 0; n < 8; n++) {
      const u = 0.16 + (n / 7) * 0.74
      bladePoint(u, 0.16, p)
      list.push([p.x, p.y, p.z - 0.012])
    }
    return list
  }, [])
}

function paintRadialBrush(g, S) {
  g.fillStyle = '#99a4a7'; g.fillRect(0, 0, S, S)
  /* concentric arcs = radial machining marks */
  for (let i = 0; i < 900; i++) {
    const r = Math.random() * S * 0.5
    const a0 = Math.random() * Math.PI * 2
    const a1 = a0 + 0.3 + Math.random() * 2.4
    const l = 120 + Math.random() * 90
    g.strokeStyle = `rgba(${l},${l},${l + 8},${0.16 + Math.random() * 0.22})`
    g.lineWidth = (0.6 + Math.random() * 1.2) * S / 512
    g.beginPath(); g.arc(S / 2, S / 2, r, a0, a1); g.stroke()
  }
  /* soft radial sheen */
  const rad = g.createRadialGradient(S/2, S/2, 0, S/2, S/2, S/2)
  rad.addColorStop(0, 'rgba(255,255,255,0.16)')
  rad.addColorStop(0.55, 'rgba(255,255,255,0)')
  rad.addColorStop(1, 'rgba(0,0,10,0.22)')
  g.fillStyle = rad; g.fillRect(0, 0, S, S)
}

/* solid-tinted copy of a loaded logo image (keeps alpha) */
function tintLogo(img, color) {
  const t = document.createElement('canvas'); t.width = img.width; t.height = img.height
  const tg = t.getContext('2d')
  tg.drawImage(img, 0, 0)
  tg.globalCompositeOperation = 'source-in'
  tg.fillStyle = color; tg.fillRect(0, 0, t.width, t.height)
  return t
}

/* hub face: radial-brushed metal + engraved grey AEVA logo (color + bump) */
function makeHubFaceTextures() {
  const S = 1024
  const c = document.createElement('canvas'); c.width = c.height = S
  const g = c.getContext('2d')
  paintRadialBrush(g, S)
  const b = document.createElement('canvas'); b.width = b.height = S
  const gb = b.getContext('2d')
  gb.fillStyle = '#808080'; gb.fillRect(0, 0, S, S)
  /* emissive map: teal logo on black so Bloom lifts it into a soft glow */
  const e = document.createElement('canvas'); e.width = e.height = S
  const ge = e.getContext('2d')
  ge.fillStyle = '#000000'; ge.fillRect(0, 0, S, S)

  const map = new THREE.CanvasTexture(c); map.colorSpace = THREE.SRGBColorSpace
  const bump = new THREE.CanvasTexture(b)
  const emissive = new THREE.CanvasTexture(e); emissive.colorSpace = THREE.SRGBColorSpace

  const img = new Image()
  img.onload = () => {
    const w = S * 0.55, h = w * img.height / img.width
    const x = (S - w) / 2, y = (S - h) / 2
    /* engraved look: bright cut edge below, dark teal recessed body */
    g.drawImage(tintLogo(img, 'rgba(180,240,238,0.55)'), x, y + S * 0.006, w, h)
    g.drawImage(tintLogo(img, 'rgba(6,40,42,0.32)'), x, y - S * 0.004, w, h)
    g.drawImage(tintLogo(img, '#1fb9ac'), x, y, w, h)
    map.needsUpdate = true
    /* bump: dark = recessed */
    gb.drawImage(tintLogo(img, '#1a1a1a'), x, y, w, h)
    bump.needsUpdate = true
    /* emissive glow: soft teal halo + crisp teal core */
    ge.filter = 'blur(6px)'
    ge.drawImage(tintLogo(img, '#39e6d4'), x, y, w, h)
    ge.filter = 'none'
    ge.drawImage(tintLogo(img, '#5df3e4'), x, y, w, h)
    emissive.needsUpdate = true
  }
  img.src = LOGO_B64
  return { map, bump, emissive }
}

function makeStreakRoughnessTexture() {
  const S = 256
  const c = document.createElement('canvas'); c.width = c.height = S
  const g = c.getContext('2d')
  g.fillStyle = '#5a5a5a'; g.fillRect(0, 0, S, S)
  for (let i = 0; i < 700; i++) {
    const y = Math.random() * S
    const l = 60 + Math.random() * 120
    g.strokeStyle = `rgba(${l},${l},${l},0.30)`
    g.lineWidth = 0.5 + Math.random()
    g.beginPath()
    g.moveTo(Math.random() * S * 0.4, y)
    g.lineTo(S * 0.6 + Math.random() * S * 0.4, y + (Math.random() - 0.5) * 6)
    g.stroke()
  }
  const t = new THREE.CanvasTexture(c)
  t.wrapS = t.wrapT = THREE.RepeatWrapping
  return t
}

/* ================= materials ================= */
function useMaterials() {
  return useMemo(() => {
    const brushRough = makeStreakRoughnessTexture()
    const hubFace = makeHubFaceTextures()
    return {
      /* AEVA palette: teal-tinted metals, dark-teal casing, gold bolt accents */
      blade: new THREE.MeshStandardMaterial({
        color: '#c4d6d9', metalness: 1.0, roughness: 0.34,
        roughnessMap: brushRough, side: THREE.DoubleSide
      }),
      bladeEdge: new THREE.MeshStandardMaterial({ color: '#eef1f4', metalness: 1.0, roughness: 0.18 }),
      hubRing:  new THREE.MeshStandardMaterial({ color: '#a9c3c8', metalness: 1.0, roughness: 0.26, roughnessMap: brushRough }),
      hubFace:  new THREE.MeshStandardMaterial({ color: '#ffffff', map: hubFace.map, bumpMap: hubFace.bump, bumpScale: 0.035, metalness: 0.92, roughness: 0.32, emissive: '#39e6d4', emissiveMap: hubFace.emissive, emissiveIntensity: 1.6 }),
      bolt:     new THREE.MeshStandardMaterial({ color: '#B78D43', metalness: 1.0, roughness: 0.24 }),
      rivet:    new THREE.MeshStandardMaterial({ color: '#799DA7', metalness: 1.0, roughness: 0.45 }),
      casing:   new THREE.MeshStandardMaterial({ color: '#193C42', metalness: 0.9, roughness: 0.5 }),
      dark:     new THREE.MeshStandardMaterial({ color: '#0e1a1e', metalness: 0.6, roughness: 0.8 })
    }
  }, [])
}

/* ================= parts ================= */
function Blade({ mats, rivetGeo }) {
  const geo = useBladeGeometry()
  const rivets = useRivetTransforms()
  return (
    <group>
      <mesh geometry={geo} material={mats.blade} castShadow />
      {rivets.map((p, i) => (
        <mesh key={i} geometry={rivetGeo} material={mats.rivet} position={p} />
      ))}
    </group>
  )
}

function Hub({ mats }) {
  const BOLTS = 8
  return (
    <group>
      {/* main hub drum */}
      <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, 0.30]}>
        <cylinderGeometry args={[1.28, 1.34, 0.55, 64]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      {/* raised outer rim */}
      <mesh position={[0, 0, 0.585]}>
        <torusGeometry args={[1.24, 0.075, 18, 72]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      {/* front face plate */}
      <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, 0.60]}>
        <cylinderGeometry args={[1.24, 1.24, 0.05, 64]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      {/* bolt bosses on the face */}
      {Array.from({ length: BOLTS }, (_, i) => {
        const a = (i / BOLTS) * Math.PI * 2 + Math.PI / BOLTS
        const x = Math.cos(a) * 1.02, y = Math.sin(a) * 1.02
        return (
          <group key={i} position={[x, y, 0.63]}>
            <mesh><torusGeometry args={[0.085, 0.028, 12, 24]} /><primitive object={mats.bolt} attach="material" /></mesh>
            <mesh rotation={[Math.PI / 2, 0, 0]}><cylinderGeometry args={[0.052, 0.052, 0.05, 20]} /><primitive object={mats.bolt} attach="material" /></mesh>
          </group>
        )
      })}
      {/* small rivet dots ring */}
      {Array.from({ length: 22 }, (_, i) => {
        const a = (i / 22) * Math.PI * 2
        return (
          <mesh key={i} position={[Math.cos(a) * 0.86, Math.sin(a) * 0.86, 0.632]}>
            <sphereGeometry args={[0.020, 10, 10]} />
            <primitive object={mats.rivet} attach="material" />
          </mesh>
        )
      })}
      {/* stepped inner rings */}
      <mesh position={[0, 0, 0.645]}>
        <torusGeometry args={[0.72, 0.035, 14, 64]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, 0.665]}>
        <cylinderGeometry args={[0.70, 0.72, 0.045, 56]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      {/* brushed spinner cap — shallow cone with engraved AEVA face */}
      <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, 0.70]}>
        <cylinderGeometry args={[0.58, 0.66, 0.16, 56, 1, true]} />
        <primitive object={mats.hubRing} attach="material" />
      </mesh>
      <mesh position={[0, 0, 0.781]}>
        <circleGeometry args={[0.58, 56]} />
        <primitive object={mats.hubFace} attach="material" />
      </mesh>
    </group>
  )
}

function Rotor({ speedRef }) {
  const mats = useMaterials()
  const rotorRef = useRef()
  const rivetGeo = useMemo(() => new THREE.SphereGeometry(0.024, 10, 10), [])

  useFrame((_, dt) => {
    if (rotorRef.current) rotorRef.current.rotation.z += Math.min(dt, 0.05) * speedRef.current
  })

  return (
    <group>
      {/* spinning assembly */}
      <group ref={rotorRef}>
        {Array.from({ length: BLADES }, (_, i) => (
          <group key={i} rotation={[0, 0, i * STEP]}>
            <Blade mats={mats} rivetGeo={rivetGeo} />
          </group>
        ))}
        <Hub mats={mats} />
        {/* rotor back disc */}
        <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, -0.45]}>
          <cylinderGeometry args={[3.45, 3.45, 0.18, 72]} />
          <primitive object={mats.dark} attach="material" />
        </mesh>
      </group>

      {/* static outer casing */}
      <mesh rotation={[Math.PI / 2, 0, 0]} position={[0, 0, 0.1]}>
        <cylinderGeometry args={[3.85, 3.85, 1.9, 96, 1, true]} />
        <meshStandardMaterial color="#4C9DAD" metalness={0.85} roughness={0.38} side={THREE.BackSide} />
      </mesh>
      <mesh position={[0, 0, 0.95]}>
        <torusGeometry args={[3.85, 0.09, 16, 96]} />
        <meshStandardMaterial color="#4C9DAD" metalness={0.85} roughness={0.32} />
      </mesh>
    </group>
  )
}

/* ================= scene ================= */
function Scene({ speedRef }) {
  return (
    <>
      <color attach="background" args={['#85888b']} />
      {/* AEVA palette: warm gold key from lower-left, brand aqua fill from the right */}
      <directionalLight position={[-5, -3.5, 6]} intensity={2.4} color="#efd3a0" />
      <directionalLight position={[6, 2, 5]} intensity={2.3} color="#59C4D9" />
      <directionalLight position={[0, 6, -4]} intensity={0.5} color="#799DA7" />
      <ambientLight intensity={0.15} />

      <Rotor speedRef={speedRef} />

      <Environment resolution={256}>
        <group>
          <Lightformer form="rect" intensity={4} color="#eed7ab" position={[-5, -4, 4]} rotation-y={Math.PI / 3.2} scale={[8, 5, 1]} />
          <Lightformer form="rect" intensity={4} color="#9fe0ee" position={[5, 3, 4]}  rotation-y={-Math.PI / 3.2} scale={[8, 6, 1]} />
          <Lightformer form="rect" intensity={1.2} color="#193C42" position={[0, 0, -6]} scale={[14, 14, 1]} />
        </group>
      </Environment>

      <EffectComposer multisampling={4}>
        <Bloom intensity={0.35} luminanceThreshold={0.7} luminanceSmoothing={0.3} mipmapBlur />
        <Vignette offset={0.2} darkness={0.35} />
      </EffectComposer>

      <OrbitControls
        enablePan={false}
        enableZoom
        minDistance={6}
        maxDistance={20}
        rotateSpeed={0.6}
        enableDamping
        dampingFactor={0.08}
      />
    </>
  )
}

function App() {
  const speedRef = useRef(1.2)

  return (
    <>
      <Canvas dpr={[1, 2]} camera={{ position: [0, 0, 12.5], fov: 40 }}
        gl={{ antialias: true, toneMapping: THREE.ACESFilmicToneMapping }}>
        <Suspense fallback={null}>
          <Scene speedRef={speedRef} />
        </Suspense>
      </Canvas>
    </>
  )
}

createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
