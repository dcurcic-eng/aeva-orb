<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEVA Orb — 3D Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #23232f;
    --text: #e8e8ef;
    --muted: #8a8a9a;
    --accent: #6c5ce7;
    --accent-hi: #8b7bff;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }
  aside {
    width: 260px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .brand {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    font-size: 15px;
    letter-spacing: 3px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .brand span {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  nav {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  button.nav-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 6px;
    font-size: 13.5px;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  button.nav-btn:hover {
    background: #1b1b26;
    border-color: var(--border);
  }
  button.nav-btn.active {
    background: linear-gradient(135deg, var(--accent), #4834b0);
    border-color: var(--accent-hi);
    color: #fff;
    font-weight: 600;
  }
  button.nav-btn .idx {
    display: inline-block;
    width: 22px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  button.nav-btn.active .idx { color: rgba(255,255,255,.7); }
  main {
    flex: 1;
    position: relative;
    height: 100vh;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #000;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--muted);
    gap: 10px;
  }
  .placeholder .dot {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--accent-hi), #2a2160 70%);
    box-shadow: 0 0 40px rgba(108,92,231,.5);
  }
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <h1>AEVA Orb</h1>
      <span>3D Element Gallery</span>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main>
    <div class="placeholder" id="placeholder">
      <div class="dot"></div>
      <div>Select an element on the left</div>
    </div>
    <iframe id="viewer" title="3D viewer" style="display:none"
            allow="fullscreen; xr-spatial-tracking; accelerometer; gyroscope"></iframe>
  </main>

<script>
  const elements = [
    { label: "Orb with Logo",        file: "orb-with-logo.html" },
    { label: "Orb Water",            file: "orb-water.html" },
    { label: "Spline Chips 3D",      file: "spline-chips-3d.html" },
    { label: "Turbine (R3F)",        file: "turbine-r3f.html" },
    { label: "Spiral (R3F)",         file: "spiral-r3f.html" },
    { label: "Beam Engine 3D",       file: "beam-engine-3d.html" },
    { label: "Gyroscope (R3F)",      file: "gyroscope-r3f.html" },
    { label: "Gyroscope Glass (R3F)",     file: "gyroscope-glass-r3f.html" },
    { label: "Gyroscope Particles (R3F)", file: "gyroscope-particles-r3f.html" },
    { label: "Newton's Cradle",      file: "newtons-cradle.html" }
  ];

  const nav = document.getElementById("nav");
  const viewer = document.getElementById("viewer");
  const placeholder = document.getElementById("placeholder");
  let buttons = [];

  function load(i) {
    placeholder.style.display = "none";
    viewer.style.display = "block";
    viewer.src = elements[i].file;
    buttons.forEach((b, j) => b.classList.toggle("active", j === i));
  }

  elements.forEach((el, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-btn";
    btn.innerHTML = '<span class="idx">' + (i + 1) + '</span>' + el.label;
    btn.addEventListener("click", () => load(i));
    nav.appendChild(btn);
    buttons.push(btn);
  });

  // auto-load the first element
  load(0);
</script>
</body>
</html>
