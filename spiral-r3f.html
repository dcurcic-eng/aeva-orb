import { EffectComposer, Bloom, Vignette } from '@react-three/postprocessing'

/* ---------------- AEVA brand palette (teal spectrum + gold accent) ---------------- */
const C = {
  black:   '#9db8bd',   // pale slate teal (structure base)
  barrel:  '#a7c2c7',   // pale aqua-grey
  dark:    '#b3cdd1',   // light mist teal
  purple:  '#4C9DAD',   // mid teal (accent slabs)
  violet:  '#59C4D9',   // bright aqua
  bright:  '#7fc4d0',   // soft cyan
  neon:    '#4BE1FF',   // bright cyan (glow)
  glowPk:  '#6fd6e8',   // pale aqua glow
  gold:    '#B78D43',   // rare complementary note
}

/* global animation speed multiplier */
const SPEED = 2.5

/* machined satin-metal base — shared by all structural surfaces */
const satin = { roughness: 0.34, metalness: 0.85, clearcoat: 0.65, clearcoatRoughness: 0.22, envMapIntensity: 1.15 }

const matDark   = { ...satin, color: C.barrel }
const matRing   = { ...satin, color: C.dark }
const matPurple = { ...satin, color: C.purple, metalness: 0.5, emissive: C.purple, emissiveIntensity: 0.55 }

/* open pipe end, watertight: the cut plane is fully sealed by a dark bore disc,
   with the wall-thickness rim layered a hair outward — no gaps, no see-through.
   dir +1 = opening at arc start, -1 = at arc end */
function PipeEnd({ radius, tube, a, dir, wallColor, emissive = false, intensity = 2 }) {
  const x = radius * Math.cos(a), y = radius * Math.sin(a)
  const ox = Math.sin(a) * dir, oy = -Math.cos(a) * dir   // outward, away from pipe body
  // ZXY order: rotate to face +Y first, then spin around Z by the arc angle —
  // keeps the cap normal aligned with the tube tangent at any angle
  const rot = useMemo(() => new THREE.Euler(-Math.PI/2, 0, a, 'ZXY'), [a])
  const e = 0.004                                          // rim layering offset
  const rimMat = emissive
    ? <meshPhysicalMaterial color={wallColor} emissive={wallColor} emissiveIntensity={intensity} toneMapped={false} side={THREE.DoubleSide} />
    : <meshPhysicalMaterial {...satin} color={wallColor} side={THREE.DoubleSide} />
  return (
    <group>
      {/* dark bore — seals the whole opening at the cut plane */}
      <mesh position={[x, y, 0]} rotation={rot}>
        <circleGeometry args={[tube * 1.001, 48]} />
        <meshPhysicalMaterial color={'#1c3238'} roughness={0.95} metalness={0} side={THREE.DoubleSide} />
      </mesh>
      {/* pipe wall cross-section rim, layered just outside the bore */}
      <mesh position={[x + ox * e, y + oy * e, 0]} rotation={rot}>
        <ringGeometry args={[tube * 0.6, tube * 1.001, 48]} />
        {rimMat}
      </mesh>
    </group>
  )
}

/* glowing arc pipe (open-ended hollow tube) */
function NeonArc({ radius, arc, tube = 0.055, color = C.neon, intensity = 2.2, rotation = [0,0,0], position=[0,0,0] }) {
  const open = arc < Math.PI * 1.98
  return (
    <group rotation={rotation} position={position}>
      <mesh>
        <torusGeometry args={[radius, tube, 16, 128, arc]} />
        <meshPhysicalMaterial color={color} emissive={color} emissiveIntensity={intensity} toneMapped={false} />
      </mesh>
      {open && <PipeEnd radius={radius} tube={tube} a={0} dir={1} wallColor={color} emissive intensity={intensity} />}
      {open && <PipeEnd radius={radius} tube={tube} a={arc} dir={-1} wallColor={color} emissive intensity={intensity} />}
    </group>
  )
}

/* solid arc pipe segment (open-ended hollow tube) */
function DarkArc({ radius, arc, tube = 0.32, rotation = [0,0,0], mat = matRing, z = 0 }) {
  const open = arc < Math.PI * 1.98
  return (
    <group rotation={rotation} position={[0,0,z]}>
      <mesh>
        <torusGeometry args={[radius, tube, 32, 96, arc]} />
        <meshPhysicalMaterial {...mat} />
      </mesh>
      {open && <PipeEnd radius={radius} tube={tube} a={0} dir={1} wallColor={mat.color} />}
      {open && <PipeEnd radius={radius} tube={tube} a={arc} dir={-1} wallColor={mat.color} />}
    </group>
  )
}

/* fine-grain noise texture for matte, rough surfaces */
function makeGrainTexture(size = 256) {
  const cv = document.createElement('canvas')
  cv.width = cv.height = size
  const ctx = cv.getContext('2d')
  const img = ctx.createImageData(size, size)
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 165 + Math.random() * 90   // mid-bright noise, keeps roughness high
    img.data[i] = img.data[i+1] = img.data[i+2] = v
    img.data[i+3] = 255
  }
  ctx.putImageData(img, 0, 0)
  const tex = new THREE.CanvasTexture(cv)
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping
  return tex
}

/* ---------------- outer ring assembly ---------------- */
function OuterRings() {
  const slow = useRef(), counter = useRef()
  const grain = useMemo(() => {
    const t = makeGrainTexture()
    t.repeat.set(24, 4)
    return t
  }, [])
  useFrame((_, dt) => {
    slow.current.rotation.z    += dt * 0.10 * SPEED
    counter.current.rotation.z -= dt * 0.16 * SPEED
  })
  return (
    <group>
      {/* main heavy outer torus — frosted glass */}
      <mesh>
        <torusGeometry args={[5.55, 0.5, 48, 160]} />
        <meshPhysicalMaterial color={'#e8f3f5'} metalness={0}
          transmission={1} roughness={0.55} thickness={1.4} ior={1.45}
          attenuationColor={'#9fd4de'} attenuationDistance={4}
          clearcoat={0.25} clearcoatRoughness={0.5} envMapIntensity={0.9}
          bumpMap={grain} bumpScale={0.35} />
      </mesh>

      {/* thin neon arcs riding the outer ring */}
      <group ref={slow}>
        <NeonArc radius={5.9}  arc={Math.PI * 0.85} rotation={[0,0, 0.4]} />
        <NeonArc radius={5.05} arc={Math.PI * 1.1}  rotation={[0,0, 2.4]} intensity={1.8} />
        <NeonArc radius={5.9}  arc={Math.PI * 0.25} rotation={[0,0, 4.2]} intensity={1.6} color={C.gold} />
      </group>
      <group ref={counter}>
        <NeonArc radius={4.55} arc={Math.PI * 0.55} rotation={[0,0, 1.1]} intensity={1.5} />
        <NeonArc radius={4.55} arc={Math.PI * 0.30} rotation={[0,0, 3.9]} intensity={1.5} />
        {/* dark C-segment sitting on the right of the outer ring */}
        <DarkArc radius={4.9} arc={Math.PI * 0.5} tube={0.42} rotation={[0,0,-0.6]} z={0.15}
                 mat={{ color:'#a5c1c6', roughness:0.5, metalness:0.4 }} />
      </group>
    </group>
  )
}

/* ---------------- mid segmented ring ---------------- */
function MidRing() {
  const g = useRef()
  useFrame((_, dt) => { g.current.rotation.z += dt * 0.07 * SPEED })
  return (
    <group ref={g} position={[0,0,-0.4]}>
      <DarkArc radius={4.15} arc={Math.PI * 0.75} rotation={[0,0, 0.9]} />
      <DarkArc radius={4.15} arc={Math.PI * 0.45} rotation={[0,0, 3.6]} />

/* ---------------- battery effect: charge cells fill up, hold, reset ---------------- */
const BATTERY_CYCLE = 4.5 / SPEED * 2  // seconds per charge cycle

function chargeLevel(t, n) {
  // 0..n+1.5 : fills one cell at a time, holds full, then resets
  return ((t % BATTERY_CYCLE) / BATTERY_CYCLE) * (n + 1.5)
}

function BatteryDots() {
  const dots = useMemo(() => {
    const p = []
    for (let row = 0; row < 4; row++)
      for (let col = 0; col <= row; col++)
        p.push([2.1 + col * 0.62 - row * 0.1, -0.9 - row * 0.62, -2.18])
    // charge from the bottom row upward
    return p.sort((a, b) => a[1] - b[1])
  }, [])
  const refs = useRef([])
  useFrame(({ clock }) => {
    const lvl = chargeLevel(clock.elapsedTime, dots.length)
    refs.current.forEach((m, i) => {
      if (!m) return
      const f = THREE.MathUtils.clamp(lvl - i, 0, 1)
      const s = f * f * (3 - 2 * f)                 // smoothstep pop-in
      m.scale.setScalar(Math.max(s, 0.001))
      m.material.emissiveIntensity = f >= 1
        ? 0.95 + Math.sin(clock.elapsedTime * 5 + i) * 0.15   // charged shimmer
        : s * 0.4
    })
  })
  return (
    <>
      {dots.map((p, k) => (
        <mesh key={k} ref={el => refs.current[k] = el} position={p} rotation={[Math.PI/2, 0, 0]}>
          <cylinderGeometry args={[0.27, 0.27, 0.09, 40]} />
          <meshPhysicalMaterial {...satin} color={C.violet} emissive={C.glowPk} emissiveIntensity={0.2} metalness={0.55} />
        </mesh>
      ))}
    </>
  )
}

function BatteryFins() {
  const refs = useRef([])
  useFrame(({ clock }) => {
    const lvl = chargeLevel(clock.elapsedTime, 8)
    refs.current.forEach((m, i) => {

}

/* battery gauge, upper-left: segments fill bottom-up like a charging battery */

  const refs = useRef([])

    refs.current.forEach((m, i) => {

      m.material.emissiveIntensity = f >= 1

/* keeps the whole model (radius ~6.5) in view at any window size */
function FitCamera() {
  const { camera, size } = useThree()
  useEffect(() => {
    const margin = 7.1
    const halfFov = (camera.fov * Math.PI) / 360
    const aspect = size.width / size.height
    const distH = margin / Math.tan(halfFov)
    const distW = margin / (Math.tan(halfFov) * aspect)
    const dist = Math.max(distH, distW)
    if (camera.position.length() < 0.001) camera.position.set(0, 0, dist)
    else camera.position.normalize().multiplyScalar(dist)   // keep view direction, fix distance
    camera.updateProjectionMatrix()
  }, [size, camera])
  return null
}
